<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>קופה — תקציב משותף</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f5f0e8; font-family: 'Segoe UI', 'Arial Hebrew', Arial, sans-serif; direction: rtl; }
@keyframes spin { to { transform: rotate(360deg); } }
.spin { animation: spin .8s linear infinite; }
.lift:active { transform: scale(.98); }
input:focus, select:focus, textarea:focus { border-color: #c8853a !important; outline: none; }
button:disabled { opacity: .6; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ── Firebase ──────────────────────────────────────────────────
const FB    = "https://villa-budget-8fa87-default-rtdb.firebaseio.com";
const furl  = p => `${FB}/${p}.json`;
const fbGet  = async p => { const r=await fetch(furl(p)); if(!r.ok) throw new Error(); return r.json(); };
const fbSet  = async (p,d) => { const r=await fetch(furl(p),{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)}); if(!r.ok) throw new Error(); return r.json(); };
const fbPush = async (p,d) => { const r=await fetch(furl(p),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)}); if(!r.ok) throw new Error(); return r.json(); };
const fbDel  = async p => fetch(furl(p),{method:"DELETE"});

// ── Constants ─────────────────────────────────────────────────
const SUPER_PIN = "kupa2025"; // super admin PIN — change here

const PROJECT_TYPES = {
  vacation: { label:"🏖️ חופשה / וילה",   color:"#c8853a", cats:["🏠 לינה","🍽️ אוכל","🎢 פעילויות","⛽ נסיעות","🎉 שונות"] },
  event:    { label:"🎉 אירוע / חגיגה",   color:"#8e44ad", cats:["🏛️ מקום","🍽️ קייטרינג","🎊 עיצוב","🎵 מוזיקה","🎉 שונות"] },
  construction:{ label:"🔨 בנייה / שיפוץ",color:"#27ae60", cats:["🧱 חומרים","👷 עבודה","📐 תכנון","📋 היתרים","🔧 שונות"] },
  trip:     { label:"✈️ טיול קבוצתי",     color:"#2980b9", cats:["✈️ טיסות","🏨 לינה","🍽️ אוכל","🗺️ סיורים","🚌 תחבורה","🎒 שונות"] },
  custom:   { label:"⚙️ מותאם אישית",     color:"#7f8c8d", cats:["📦 כללי","🎉 שונות"] },
};

const SPLIT_MODES = [
  { id:"equal",    label:"חלקים שווים" },
  { id:"persons",  label:"לפי נפשות" },
  { id:"weighted", label:"נפשות × ימים" },
  { id:"manual",   label:"קביעה ידנית" },
];

// Styles
const C = (color="#c8853a") => `linear-gradient(135deg,${color},${color}cc)`;
const S = {
  app:  {minHeight:"100vh",background:"#f5f0e8"},
  ctr:  {display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",height:"100vh",background:"#f5f0e8"},
  sp:   {width:36,height:36,border:"3px solid #d4a96a",borderTopColor:"transparent",borderRadius:"50%"},
  card: {background:"white",borderRadius:14,padding:14,marginBottom:10,boxShadow:"0 2px 10px rgba(0,0,0,.06)"},
  inp:  {border:"2px solid #ede0cc",borderRadius:9,padding:"9px 10px",fontSize:13,background:"#fafafa",width:"100%",marginBottom:8},
  sel:  {border:"2px solid #ede0cc",borderRadius:9,padding:"9px 10px",fontSize:13,background:"#fafafa",width:"100%",marginBottom:8},
  ta:   {border:"2px solid #ede0cc",borderRadius:9,padding:"9px 10px",fontSize:13,background:"#fafafa",width:"100%",marginBottom:8,resize:"none"},
  row:  {display:"flex",gap:8,marginBottom:8,alignItems:"center"},
  lbl:  {fontSize:11,color:"#888",marginBottom:4,fontWeight:600,display:"block"},
  err:  {color:"#e74c3c",fontSize:12,textAlign:"center",marginBottom:6},
  ov:   {position:"fixed",inset:0,background:"rgba(0,0,0,.55)",display:"flex",justifyContent:"center",alignItems:"center",zIndex:100,padding:12},
  mod:  {background:"white",borderRadius:18,padding:18,width:"100%",maxWidth:420,maxHeight:"90vh",overflowY:"auto"},
  del:  {background:"none",border:"none",color:"#ddd",fontSize:12,cursor:"pointer",padding:"3px 5px",flexShrink:0},
  pri:  (col="#c8853a")=>({width:"100%",background:C(col),color:"white",border:"none",borderRadius:11,padding:12,fontSize:14,fontWeight:700,cursor:"pointer",marginTop:4}),
  sec:  (col="#3498db")=>({width:"100%",background:col+"22",color:col,border:"none",borderRadius:11,padding:10,fontSize:13,fontWeight:600,cursor:"pointer",marginTop:5}),
  gho:  {width:"100%",background:"transparent",border:"2px dashed #d4a96a",color:"#c8853a",borderRadius:9,padding:9,fontSize:13,fontWeight:600,cursor:"pointer",marginTop:4},
  pill: (col)=>({background:col+"22",color:col,padding:"2px 9px",borderRadius:20,fontSize:11,fontWeight:600,display:"inline-block"}),
};

// ── Calc ─────────────────────────────────────────────────────
function calcProject(proj, expenses, deposits) {
  const members = proj?.members||[];
  const expList = Object.entries(expenses||{}).sort((a,b)=>(b[1].ts||0)-(a[1].ts||0));
  const depList = Object.entries(deposits||{});
  const w = m => {
    if (proj.splitMode==="equal")    return 1;
    if (proj.splitMode==="persons")  return m.persons||1;
    if (proj.splitMode==="weighted") return (m.persons||1)*((m.days||proj.totalDays||1)/(proj.totalDays||1));
    if (proj.splitMode==="manual")   return m.manualShare||0;
    return 1;
  };
  const totalW   = members.reduce((s,m)=>s+w(m),0);
  const totalSh  = expList.filter(([,e])=>e.shared&&e.type!=="refund").reduce((s,[,e])=>s+e.amount,0);
  const cpu      = totalW>0 ? totalSh/totalW : 0;
  const mDep     = m => depList.filter(([,d])=>d.member===m.id).reduce((s,[,d])=>s+d.amount,0);
  const mPriv    = m => expList.filter(([,e])=>e.paidBy===m.id&&e.source==="private"&&e.shared&&e.type!=="refund").reduce((s,[,e])=>s+e.amount,0);
  const mRef     = m => expList.filter(([,e])=>e.type==="refund"&&e.memberId===m.id).reduce((s,[,e])=>s+e.amount,0);
  const mShare   = m => cpu*w(m);
  const mContrib = m => mDep(m)+mPriv(m);
  const mBal     = m => mContrib(m)-mShare(m)-mRef(m);
  const totDep   = depList.reduce((s,[,d])=>s+d.amount,0);
  const envExp   = expList.filter(([,e])=>e.source==="envelope"&&e.shared&&e.type!=="refund").reduce((s,[,e])=>s+e.amount,0);
  const refGiven = expList.filter(([,e])=>e.type==="refund").reduce((s,[,e])=>s+e.amount,0);
  const envBal   = totDep-envExp-refGiven;
  const projRef  = members.reduce((s,m)=>{const b=mBal(m);return s+(b>0?b:0);},0);
  const netAv    = envBal-projRef;
  return { members,expList,depList,totalSh,cpu,totalW,w,
           mDep,mPriv,mRef,mShare,mContrib,mBal,
           envBal,totDep,envExp,refGiven,projRef,netAv,
           shortfall:totalSh-totDep };
}

// ═══════════════════════════════════════════════════════════════
function App() {
  const [loading, setLoading]   = useState(true);
  const [root,    setRoot]      = useState(null);   // kupa root config
  const [role,    setRole]      = useState("user"); // user | admin | super
  const [projects,setProjects]  = useState({});
  const [activeId,setActiveId]  = useState(null);
  const [expenses,setExpenses]  = useState({});
  const [deposits,setDeposits]  = useState({});
  const [saving,  setSaving]    = useState(false);
  const [connErr, setConnErr]   = useState("");

  // Modals
  const [pinModal,   setPinModal]   = useState(false);
  const [pinInput,   setPinInput]   = useState("");
  const [pinErr,     setPinErr]     = useState("");
  const [newPrModal, setNewPrModal] = useState(false);
  const [refModal,   setRefModal]   = useState(false);
  const [editMModal, setEditMModal] = useState(false);
  const [analyticsM, setAnalyticsM] = useState(false);

  // Project view
  const [pView, setPView] = useState("expenses");
  const [exp, setExp] = useState({paidBy:"",amount:"",cat:"",note:"",shared:true,source:"envelope"});
  const [dep, setDep] = useState({member:"",amount:""});
  const [ref, setRef] = useState({memberId:"",amount:"",note:""});

  // ── Bootstrap ───────────────────────────────────────────────
  const loadRoot = useCallback(async () => {
    setConnErr("");
    try {
      const data = await fbGet("kupa2");
      if (!data) {
        // First ever launch — super admin setup
        setRoot(null); setLoading(false); return;
      }
      setRoot(data);
      setProjects(data.projects||{});
      setLoading(false);
    } catch { setConnErr("שגיאת חיבור"); setLoading(false); }
  },[]);

  useEffect(()=>{ loadRoot(); },[loadRoot]);

  const loadProject = useCallback(async id => {
    try {
      const [e,d]=await Promise.all([fbGet(`kupa2_exp/${id}`),fbGet(`kupa2_dep/${id}`)]);
      setExpenses(e||{}); setDeposits(d||{});
    } catch {}
  },[]);

  useEffect(()=>{
    if (!activeId) return;
    loadProject(activeId);
    const id=setInterval(()=>loadProject(activeId),6000);
    return ()=>clearInterval(id);
  },[activeId,loadProject]);

  // ── First setup ──────────────────────────────────────────────
  const [setupPin, setSetupPin] = useState("");
  const [setupErr, setSetupErr] = useState("");
  const firstSetup = async () => {
    if (setupPin !== SUPER_PIN) { setSetupErr("קוד שגוי"); return; }
    const newRoot = { projects:{}, createdAt:Date.now() };
    await fbSet("kupa2", newRoot);
    setRoot(newRoot); setProjects({}); setRole("super");
  };

  // ── Auth ─────────────────────────────────────────────────────
  const tryLogin = () => {
    if (pinInput === SUPER_PIN) {
      setRole("super"); setPinModal(false); setPinInput(""); setPinErr(""); return;
    }
    // Check if it's a project admin PIN
    const proj = activeId ? projects[activeId] : null;
    if (proj && pinInput === proj.adminPin) {
      setRole("admin"); setPinModal(false); setPinInput(""); setPinErr(""); return;
    }
    // Check any project admin pin (for home screen)
    const match = Object.values(projects).find(p=>p.adminPin===pinInput);
    if (match) {
      setRole("admin"); setPinModal(false); setPinInput(""); setPinErr("");
      setActiveId(match.id); setPView("expenses"); return;
    }
    setPinErr("קוד שגוי"); setPinInput("");
  };

  // ── Projects ─────────────────────────────────────────────────
  const createProject = async (proj) => {
    const id = "p"+Date.now();
    const newP = { ...proj, id, createdAt:Date.now(), status:"active" };
    const updated = { ...projects, [id]:newP };
    await fbSet("kupa2/projects", updated);
    setProjects(updated);
    return id;
  };
  const updateProject = async (id, patch) => {
    const updated = { ...projects, [id]:{ ...projects[id], ...patch } };
    await fbSet("kupa2/projects", updated);
    setProjects(updated);
  };
  const archiveProject = async id => { await updateProject(id,{status:"archived"}); };
  const deleteProject  = async id => {
    const n={...projects}; delete n[id];
    await fbSet("kupa2/projects",n);
    await fbDel(`kupa2_exp/${id}`); await fbDel(`kupa2_dep/${id}`);
    setProjects(n);
  };

  // ── Expenses ─────────────────────────────────────────────────
  const addExpense = async () => {
    if (!exp.paidBy||!exp.amount||isNaN(+exp.amount)) return;
    const item={paidBy:exp.paidBy,amount:+exp.amount,cat:exp.cat||"כללי",
      note:exp.note,shared:exp.shared,source:exp.source,type:"expense",
      ts:Date.now(),time:new Date().toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"})};
    setSaving(true);
    try {
      const {name}=await fbPush(`kupa2_exp/${activeId}`,item);
      setExpenses(p=>({...p,[name]:item}));
      setExp({paidBy:"",amount:"",cat:"",note:"",shared:true,source:"envelope"});
    } catch {setConnErr("שגיאה");} finally {setSaving(false);}
  };
  const delExp = async k => { await fbDel(`kupa2_exp/${activeId}/${k}`); setExpenses(p=>{const n={...p};delete n[k];return n;}); };

  // ── Deposits ─────────────────────────────────────────────────
  const addDeposit = async () => {
    if (!dep.member||!dep.amount) return;
    const item={member:dep.member,amount:+dep.amount,ts:Date.now()};
    setSaving(true);
    try {
      const {name}=await fbPush(`kupa2_dep/${activeId}`,item);
      setDeposits(p=>({...p,[name]:item}));
      setDep({member:"",amount:""});
    } catch {setConnErr("שגיאה");} finally {setSaving(false);}
  };
  const delDep = async k => { await fbDel(`kupa2_dep/${activeId}/${k}`); setDeposits(p=>{const n={...p};delete n[k];return n;}); };

  // ── Refund ───────────────────────────────────────────────────
  const addRefund = async () => {
    if (!ref.memberId||!ref.amount) return;
    const item={type:"refund",memberId:ref.memberId,amount:+ref.amount,
      note:ref.note||"החזר",paidBy:"קופה",source:"envelope",shared:false,
      ts:Date.now(),time:new Date().toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"})};
    setSaving(true);
    try {
      const {name}=await fbPush(`kupa2_exp/${activeId}`,item);
      setExpenses(p=>({...p,[name]:item}));
      setRef({memberId:"",amount:"",note:""}); setRefModal(false);
    } catch {setConnErr("שגיאה");} finally {setSaving(false);}
  };

  // ── Helpers ──────────────────────────────────────────────────
  const proj     = activeId ? projects[activeId] : null;
  const Calc     = proj ? calcProject(proj,expenses,deposits) : null;
  const projCol  = proj ? (PROJECT_TYPES[proj.type]?.color||"#c8853a") : "#c8853a";
  const mName    = id => proj?.members?.find(m=>m.id===id)?.name||id;
  const cats     = proj ? (PROJECT_TYPES[proj.type]?.cats||["כללי"]) : [];
  const isAdmin  = role==="admin"||role==="super";
  const isSuper  = role==="super";

  // ── LOADING ──────────────────────────────────────────────────
  if (loading) return (
    <div style={S.ctr}>
      <div className="spin" style={S.sp}/>
      <div style={{color:"#c8853a",marginTop:12,fontSize:14,fontWeight:600}}>טוען קופה...</div>
    </div>
  );

  // ── FIRST SETUP (super admin) ────────────────────────────────
  if (!root) return (
    <div style={S.app}>
      <div style={{background:C(),padding:"40px 20px 28px",color:"white",textAlign:"center"}}>
        <div style={{fontSize:52,marginBottom:8}}>💰</div>
        <div style={{fontSize:28,fontWeight:800}}>קופה</div>
        <div style={{fontSize:13,opacity:.8,marginTop:4}}>ניהול תקציב משותף לכל פרויקט</div>
      </div>
      <div style={{padding:16,maxWidth:400,margin:"0 auto"}}>
        <div style={S.card}>
          <div style={{fontSize:14,fontWeight:700,color:"#2c1810",marginBottom:4}}>כניסת מפעיל ראשית</div>
          <div style={{fontSize:11,color:"#aaa",marginBottom:12}}>הזן את קוד הגישה של המפעיל</div>
          <input type="password" placeholder="קוד סודי" value={setupPin}
            onChange={e=>setSetupPin(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&firstSetup()}
            style={S.inp}/>
          {setupErr&&<div style={S.err}>{setupErr}</div>}
          <button onClick={firstSetup} style={S.pri()}>כנס 🚀</button>
        </div>
      </div>
    </div>
  );

  // ════════════════════════════════════════════════════════════
  // HOME SCREEN
  // ════════════════════════════════════════════════════════════
  if (!activeId) {
    const active   = Object.values(projects).filter(p=>p.status==="active").sort((a,b)=>b.createdAt-a.createdAt);
    const archived = Object.values(projects).filter(p=>p.status==="archived").sort((a,b)=>b.createdAt-a.createdAt);

    return (
      <div style={S.app}>
        {/* Header */}
        <div style={{background:C(),padding:"18px 14px 14px",color:"white"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:22,fontWeight:800}}>💰 קופה</div>
              <div style={{fontSize:11,opacity:.75,marginTop:2}}>
                {isSuper?"מפעיל ראשי 👑":isAdmin?"אדמין 🔑":"משתמש"}
              </div>
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              {isSuper&&<button onClick={()=>setAnalyticsM(true)}
                style={{background:"rgba(255,255,255,.2)",border:"none",color:"white",padding:"5px 10px",borderRadius:16,fontSize:11,cursor:"pointer"}}>
                📊 ניתוח
              </button>}
              <button onClick={()=>{setPinModal(true);setPinErr("");setPinInput("");}}
                style={{background:"rgba(255,255,255,.2)",border:"none",color:"white",padding:"5px 12px",borderRadius:16,fontSize:12,cursor:"pointer",fontWeight:600}}>
                {isSuper?"👑":isAdmin?"🔑":"🔐"}
              </button>
            </div>
          </div>
        </div>

        <div style={{padding:14,maxWidth:520,margin:"0 auto"}}>
          {isSuper&&(
            <button onClick={()=>setNewPrModal(true)}
              style={{...S.pri(),display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:14}}>
              <span style={{fontSize:18}}>+</span> פרויקט חדש
            </button>
          )}

          {connErr&&<div style={{...S.err,background:"#fff5f5",padding:10,borderRadius:8,marginBottom:10}}>{connErr}</div>}

          {active.length===0&&archived.length===0&&(
            <div style={{textAlign:"center",color:"#aaa",padding:48,fontSize:14}}>
              <div style={{fontSize:44,marginBottom:12}}>📋</div>
              {isSuper?"לחץ + כדי ליצור פרויקט ראשון":"ממתין לפרויקטים..."}
            </div>
          )}

          {active.length>0&&<>
            <div style={{fontSize:11,color:"#aaa",fontWeight:600,marginBottom:8}}>פרויקטים פעילים</div>
            {active.map(p=>{
              const ti=PROJECT_TYPES[p.type]||PROJECT_TYPES.custom;
              return (
                <div key={p.id} className="lift"
                  onClick={()=>{ setActiveId(p.id); setPView("expenses"); }}
                  style={{...S.card,cursor:"pointer",borderRight:`4px solid ${ti.color}`,padding:"13px 15px",marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:15,fontWeight:700,color:"#2c1810"}}>{p.name}</div>
                      <div style={{fontSize:11,color:"#aaa",marginTop:2}}>
                        {ti.label} · {p.members?.length||0} משתתפים · {p.totalDays||"?"}ד
                      </div>
                      {p.description&&<div style={{fontSize:11,color:"#888",marginTop:3,fontStyle:"italic"}}>{p.description}</div>}
                    </div>
                    <span style={S.pill(ti.color)}>{p.members?.length||0} 👥</span>
                  </div>
                </div>
              );
            })}
          </>}

          {archived.length>0&&isSuper&&<>
            <div style={{fontSize:11,color:"#aaa",fontWeight:600,marginBottom:8,marginTop:10}}>ארכיון</div>
            {archived.map(p=>{
              const ti=PROJECT_TYPES[p.type]||PROJECT_TYPES.custom;
              return (
                <div key={p.id} style={{...S.card,opacity:.55,padding:"10px 13px",marginBottom:6,borderRight:`3px solid ${ti.color}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{fontSize:13,fontWeight:600,color:"#555"}}>{p.name}</div>
                      <div style={{fontSize:11,color:"#aaa"}}>{ti.label}</div>
                    </div>
                    <div style={{display:"flex",gap:5}}>
                      <button onClick={()=>updateProject(p.id,{status:"active"})}
                        style={{background:"#e8f5e9",border:"none",color:"#27ae60",borderRadius:7,padding:"4px 9px",fontSize:11,cursor:"pointer"}}>שחזר</button>
                      <button onClick={()=>deleteProject(p.id)}
                        style={{background:"#fdecea",border:"none",color:"#e74c3c",borderRadius:7,padding:"4px 9px",fontSize:11,cursor:"pointer"}}>מחק</button>
                    </div>
                  </div>
                </div>
              );
            })}
          </>}
        </div>

        {/* PIN modal */}
        {pinModal&&<PinModal pinInput={pinInput} setPinInput={setPinInput} pinErr={pinErr}
          onTry={tryLogin} onClose={()=>{setPinModal(false);setPinInput("");setPinErr("");}}
          isLoggedIn={isAdmin} onLogout={()=>{setRole("user");setPinModal(false);}} color="#c8853a"/>}

        {/* New project modal */}
        {newPrModal&&<NewProjectModal onClose={()=>setNewPrModal(false)} onCreate={async p=>{
          const id=await createProject(p); setNewPrModal(false); setActiveId(id); setPView("expenses");
        }}/>}

        {/* Analytics modal */}
        {analyticsM&&<AnalyticsModal projects={projects} onClose={()=>setAnalyticsM(false)}/>}
      </div>
    );
  }

  // ════════════════════════════════════════════════════════════
  // PROJECT SCREEN
  // ════════════════════════════════════════════════════════════
  if (!proj||!Calc) return null;
  const envColor = Calc.envBal>=0?"#27ae60":"#e74c3c";
  const netColor = Calc.netAv>=0?"#27ae60":"#e74c3c";

  return (
    <div style={S.app}>
      {/* Header */}
      <div style={{background:C(projCol),padding:"13px 13px 11px",color:"white"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>

                    ["חלק בהוצאות",`−₪${Calc.mShare(m).toFixed(0)}`,"#e74c3c"],
                    ...(Calc.mRef(m)>0?[["קיבל החזר",`−₪${Calc.mRef(m).toFixed(0)}`,"#e74c3c"]]:[]),

          <div style={{...S.card,background:"#f0fff4",border:"1px solid #c3e6cb"}}>
            {[["הפקדות",`+₪${Calc.totDep.toFixed(0)}`,"#27ae60"],
              ["הוצאות מעטפה",`−₪${Calc.envExp.toFixed(0)}`,"#e74c3c"],
              ["החזרים",`−₪${Calc.refGiven.toFixed(0)}`,"#e74c3c"]]
              .map(([l,v,c])=>(
                <div key={l} style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#666",marginBottom:4}}>
                  <span>{l}</span><span style={{color:c}}>{v}</span>

            <div style={{borderTop:"1px solid #b2dfdb",paddingTop:5,marginTop:4,display:"flex",justifyContent:"space-between",fontSize:13,fontWeight:700}}>
              <span>פנוי בפועל</span><span style={{color:netColor}}>₪{Calc.netAv.toFixed(0)}</span>

        </>}

        {/* ── DEPOSITS ── */}
        {pView==="deposits"&&<>
          <div style={S.card}>
            <div style={{fontSize:13,fontWeight:700,color:"#2c1810",marginBottom:9}}>רישום הפקדה</div>
            <div style={S.row}>
              <select value={dep.member} onChange={e=>setDep({...dep,member:e.target.value})}
                style={{...S.sel,marginBottom:0}}>
                <option value="">בחר משתתף</option>
                {Calc.members.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
              </select>
              <input type="number" placeholder="₪" value={dep.amount}
                onChange={e=>setDep({...dep,amount:e.target.value})}
                style={{...S.inp,marginBottom:0,flex:"0 0 76px"}}/>

          </div>
          {Calc.members.map(m=>(
            <div key={m.id} style={{...S.card,padding:"10px 13px",marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:13,fontWeight:700,color:"#2c1810"}}>{m.name}</div>
              <div style={{fontSize:15,fontWeight:800,color:projCol}}>₪{Calc.mDep(m).toFixed(0)}</div>
            </div>
          ))}
          {Calc.depList.length>0&&<>
            <div style={{fontSize:11,color:"#aaa",marginBottom:5,marginTop:2}}>היסטוריה</div>
            {[...Calc.depList].sort((a,b)=>(b[1].ts||0)-(a[1].ts||0)).map(([k,d])=>(
              <div key={k} style={{background:"white",borderRadius:10,padding:"9px 12px",display:"flex",
                alignItems:"center",gap:8,boxShadow:"0 1px 5px rgba(0,0,0,.05)",marginBottom:5}}>
                <span style={{fontSize:16}}>💰</span>
                <div style={{flex:1}}><div style={{fontWeight:600,fontSize:12,color:"#2c1810"}}>{mName(d.member)}</div></div>
                <span style={{fontWeight:700,color:projCol,fontSize:13}}>₪{d.amount.toFixed(0)}</span>

              </div>

          </>}

        {/* ── ADMIN TAB ── */}
        {pView==="admin"&&isAdmin&&<>
          <div style={S.card}>
            <div style={{fontSize:13,fontWeight:700,color:"#2c1810",marginBottom:8}}>שיתוף קישור</div>
            <button onClick={()=>navigator.clipboard.writeText(window.location.href)} style={S.pri(projCol)}>
              📋 העתק קישור
            </button>
          </div>
          <div style={S.card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div style={{fontSize:13,fontWeight:700,color:"#2c1810"}}>משתתפים</div>

                style={{background:"#fdf3e6",border:"none",color:projCol,borderRadius:7,padding:"4px 9px",fontSize:11,fontWeight:600,cursor:"pointer"}}>

              </button>
            </div>
            {Calc.members.map(m=>(
              <div key={m.id} style={{display:"flex",justifyContent:"space-between",background:"#fdf3e6",borderRadius:7,padding:"6px 10px",marginBottom:4}}>
                <span style={{fontSize:12,fontWeight:600,color:"#a0662a"}}>{m.name}</span>
                <span style={{fontSize:11,color:projCol}}>

          <div style={S.card}>
            <div style={{fontSize:13,fontWeight:700,color:"#2c1810",marginBottom:8}}>פעולות</div>
            <button onClick={()=>setRefModal(true)} style={{...S.pri(),...{background:"#3498db"},marginBottom:6}}>

            </button>
            <button onClick={async()=>{await fbSet(`kupa2_exp/${activeId}`,null);await fbSet(`kupa2_dep/${activeId}`,null);setExpenses({});setDeposits({});}}
              style={{...S.pri(),...{background:"#e67e22"},marginBottom:6}}>

            </button>
            {isSuper&&<button onClick={async()=>{await archiveProject(activeId);setActiveId(null);}}
              style={{...S.gho,borderColor:"#e74c3c",color:"#e74c3c"}}>
              📦 העבר לארכיון
            </button>}
          </div>
          {isSuper&&proj.questionnaire&&<div style={S.card}>
            <div style={{fontSize:13,fontWeight:700,color:"#2c1810",marginBottom:8}}>📋 שאלון הפרויקט</div>
            {Object.entries(proj.questionnaire).map(([k,v])=>(
              <div key={k} style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:5,color:"#666",borderBottom:"1px solid #f5f0e8",paddingBottom:4}}>

                <span style={{fontWeight:600,color:"#2c1810"}}>{v}</span>
              </div>
            ))}
          </div>}
        </>}
      </div>

      {/* Modals */}
      {refModal&&<RefundModal members={Calc.members} ref_={ref} setRef={setRef}
        onAdd={addRefund} onClose={()=>setRefModal(false)} saving={saving} color={projCol}/>}
      {editMModal&&<EditMembersModal proj={proj} onClose={()=>setEditMModal(false)}
        onSave={async members=>{await updateProject(activeId,{members});setEditMModal(false);}}/>}
      {pinModal&&<PinModal pinInput={pinInput} setPinInput={setPinInput} pinErr={pinErr}
        onTry={tryLogin} onClose={()=>{setPinModal(false);setPinInput("");setPinErr("");}}
        isLoggedIn={isAdmin} onLogout={()=>{setRole("user");setPinModal(false);}} color={projCol}/>}
    </div>
  );
}

// ── PIN Modal ─────────────────────────────────────────────────
function PinModal({pinInput,setPinInput,pinErr,onTry,onClose,isLoggedIn,onLogout,color}) {
  return (
    <div style={S.ov} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={S.mod}>
        <div style={{fontSize:15,fontWeight:700,color:"#2c1810",textAlign:"center",marginBottom:12}}>
          {isLoggedIn?"אפשרויות ניהול":"כניסת מנהל 🔑"}
        </div>
        {!isLoggedIn?<>
          <input type="password" placeholder="קוד גישה" value={pinInput}
            onChange={e=>setPinInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&onTry()} autoFocus
            style={{...S.inp,textAlign:"center",fontSize:20,letterSpacing:8}}/>
          {pinErr&&<div style={S.err}>{pinErr}</div>}
          <button onClick={onTry} style={S.pri(color)}>כנס</button>
        </>:<button onClick={onLogout} style={S.gho}>התנתק</button>}
      </div>
    </div>
  );
}

// ── Refund Modal ──────────────────────────────────────────────
function RefundModal({members,ref_,setRef,onAdd,onClose,saving,color}) {
  return (
    <div style={S.ov} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={S.mod}>
        <div style={{fontSize:15,fontWeight:700,color:"#2c1810",marginBottom:10}}>💵 החזר מזומן</div>
        <label style={S.lbl}>משתתף מקבל</label>
        <select value={ref_.memberId} onChange={e=>setRef({...ref_,memberId:e.target.value})} style={S.sel}>
          <option value="">בחר...</option>
          {members.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
        </select>
        <label style={S.lbl}>סכום ₪</label>
        <input type="number" value={ref_.amount} onChange={e=>setRef({...ref_,amount:e.target.value})} style={S.inp}/>
        <label style={S.lbl}>הערה</label>
        <input value={ref_.note} onChange={e=>setRef({...ref_,note:e.target.value})} style={S.inp}/>
        <button onClick={onAdd} disabled={saving} style={{...S.pri(),...{background:"#3498db"}}}>{saving?"שומר...":"אשר החזר"}</button>
        <button onClick={onClose} style={S.gho}>ביטול</button>
      </div>
    </div>
  );
}

// ── Edit Members Modal ────────────────────────────────────────
function EditMembersModal({proj,onClose,onSave}) {
  const [members,setMembers] = useState(proj.members.map(m=>({...m})));
  const [saving,setSaving]   = useState(false);
  const upd = (i,k,v)=>{const n=[...members];n[i]={...n[i],[k]:v};setMembers(n);};
  return (
    <div style={S.ov} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={S.mod}>
        <div style={{fontSize:15,fontWeight:700,color:"#2c1810",marginBottom:12}}>עריכת משתתפים</div>
        {members.map((m,i)=>(
          <div key={m.id} style={{background:"#fafafa",borderRadius:10,padding:10,marginBottom:8,border:"1px solid #ede0cc"}}>
            <div style={S.row}>
              <input value={m.name} onChange={e=>upd(i,"name",e.target.value)} style={{...S.inp,marginBottom:0,flex:2}}/>
              <input type="number" min="1" value={m.persons} onChange={e=>upd(i,"persons",parseInt(e.target.value)||1)}
                style={{...S.inp,marginBottom:0,flex:"0 0 58px",textAlign:"center"}}/>
              {members.length>1&&<button onClick={()=>setMembers(members.filter((_,j)=>j!==i))} style={{...S.del,color:"#e74c3c"}}>✕</button>}
            </div>
          </div>
        ))}
        <button onClick={()=>setMembers([...members,{id:"m"+Date.now(),name:"",persons:1,days:proj.totalDays||3}])} style={S.gho}>+ הוסף</button>
        <button onClick={async()=>{setSaving(true);await onSave(members);setSaving(false);}} disabled={saving} style={S.pri()}>
          {saving?"שומר...":"שמור ✓"}
        </button>
        <button onClick={onClose} style={S.gho}>ביטול</button>
      </div>
    </div>
  );
}

// ── New Project Modal (super admin only) ──────────────────────
function NewProjectModal({onClose,onCreate}) {
  const [step,   setStep]   = useState(1);
  const [type,   setType]   = useState("");
  const [saving, setSaving] = useState(false);
  const [err,    setErr]    = useState("");

  // Step 1: basics
  const [name,      setName]      = useState("");
  const [desc,      setDesc]      = useState("");
  const [adminPin,  setAdminPin]  = useState("");
  const [splitMode, setSplit]     = useState("persons");
  const [totalDays, setTotalDays] = useState("3");
  const [goal,      setGoal]      = useState("");

  // Step 2: questionnaire
  const [q, setQ] = useState({
    groupType:"משפחות עם ילדים", priorEvents:"כן",
    avgAge:"35-45", luxLevel:"3", location:"ארץ",
    paymentMethod:"מזומן + ביט", purpose:"חיבור",
    budget:"", extraNotes:""
  });

  // Step 3: members
  const [members, setMembers] = useState([{id:"m1",name:"",persons:1,days:3}]);

  const ti = PROJECT_TYPES[type];

  const submit = async () => {
    if (!name.trim()){setErr("יש לתת שם");return;}
    if (adminPin.length<4){setErr("קוד אדמין — לפחות 4 תווים");return;}
    const mems = members.filter(m=>m.name.trim()).map(m=>({...m,persons:parseInt(m.persons)||1,days:parseInt(m.days)||parseInt(totalDays)||3}));
    if (mems.length<1){setErr("יש להוסיף לפחות משתתף אחד");return;}
    setSaving(true);
    try {
      await onCreate({ type, name:name.trim(), description:desc.trim(),
        adminPin, splitMode, totalDays:parseInt(totalDays)||3,
        goal:goal?parseFloat(goal):null, members:mems,
        questionnaire:{
          "סוג קבוצה":q.groupType, "אירועים קודמים":q.priorEvents,
          "טווח גיל":q.avgAge, "רמת פנסיוניות (1-5)":q.luxLevel,
          "יעד":q.location, "אמצעי תשלום":q.paymentMethod,
          "מטרת האירוע":q.purpose,
          ...(q.budget?{"תקציב מוערך":q.budget}:{}),
          ...(q.extraNotes?{"הערות":q.extraNotes}:{}),
        }
      });
    } catch {setErr("שגיאה");} finally {setSaving(false);}
  };

  const updM = (i,k,v)=>{const n=[...members];n[i]={...n[i],[k]:v};setMembers(n);};

  return (
    <div style={S.ov} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={S.mod}>
        {/* Progress */}
        <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:14}}>
          {[1,2,3].map(s=>(
            <div key={s} style={{width:8,height:8,borderRadius:"50%",background:step>=s?"#c8853a":"#ede0cc",transition:"background .3s"}}/>
          ))}
        </div>

        {/* Step 1: Type + basics */}
        {step===1&&<>
          <div style={{fontSize:15,fontWeight:700,color:"#2c1810",marginBottom:12,textAlign:"center"}}>סוג הפרויקט</div>
          {!type&&Object.entries(PROJECT_TYPES).map(([k,v])=>(
            <button key={k} onClick={()=>setType(k)}
              style={{width:"100%",background:"white",border:`2px solid ${v.color}22`,borderRadius:11,
                padding:"11px 13px",marginBottom:7,cursor:"pointer",textAlign:"right",
                display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:34,height:34,borderRadius:"50%",background:v.color+"22",
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>
                {v.label.split(" ")[0]}
              </div>
              <div style={{fontSize:13,fontWeight:700,color:"#2c1810"}}>{v.label.split(" ").slice(1).join(" ")}</div>
            </button>
          ))}
          {type&&ti&&<>
            <div style={{...S.pill(ti.color),marginBottom:12,cursor:"pointer"}} onClick={()=>setType("")}>
              {ti.label} ← שנה
            </div>
            <label style={S.lbl}>שם הפרויקט *</label>
            <input placeholder='לדוגמה: "וילה מאי 2025"' value={name} onChange={e=>setName(e.target.value)} style={S.inp}/>
            <label style={S.lbl}>תיאור קצר</label>
            <textarea placeholder="מהות הפרויקט, מטרות..." value={desc} onChange={e=>setDesc(e.target.value)} style={{...S.ta,height:55}}/>
            <div style={S.row}>
              <div style={{flex:1}}>
                <label style={S.lbl}>סה"כ ימים</label>
                <input type="number" min="1" value={totalDays} onChange={e=>setTotalDays(e.target.value)} style={{...S.inp,marginBottom:0}}/>
              </div>
              <div style={{flex:1}}>
                <label style={S.lbl}>יעד תקציב ₪</label>
                <input type="number" value={goal} onChange={e=>setGoal(e.target.value)} style={{...S.inp,marginBottom:0}}/>
              </div>
            </div>
            <label style={{...S.lbl,marginTop:8}}>שיטת חלוקה</label>
            <select value={splitMode} onChange={e=>setSplit(e.target.value)} style={S.sel}>
              {SPLIT_MODES.map(m=><option key={m.id} value={m.id}>{m.label}</option>)}
            </select>
            <label style={S.lbl}>קוד אדמין קבוצתי *</label>
            <input type="password" placeholder="קוד שתמסור לאדמין הקבוצה (4+ תווים)"
              value={adminPin} onChange={e=>setAdminPin(e.target.value)} style={S.inp}/>
            <div style={{fontSize:11,color:"#aaa",background:"#f8f8f8",borderRadius:8,padding:"7px 10px",marginBottom:8}}>
              💡 הקוד הזה יאפשר לאדמין הקבוצה לנהל הוצאות, החזרים ועריכת משתתפים
            </div>
            {err&&<div style={S.err}>{err}</div>}
            <button onClick={()=>{if(!name.trim()||adminPin.length<4){setErr("מלא שם + קוד אדמין");return;}setErr("");setStep(2);}}
              style={S.pri(ti.color)}>המשך ←</button>
          </>}
        </>}

        {/* Step 2: Questionnaire */}
        {step===2&&ti&&<>
          <div style={{fontSize:15,fontWeight:700,color:"#2c1810",marginBottom:4}}>📋 שאלון פרויקט</div>
          <div style={{fontSize:11,color:"#aaa",marginBottom:12}}>המידע ישמש לייעוץ ולשיפור האפליקציה</div>

          {[
            {l:"סוג הקבוצה",k:"groupType",opts:["זוגות בלבד","משפחות עם ילדים","חברים ללא ילדים","מעורב"]},
            {l:"אירועים קודמים יחד?",k:"priorEvents",opts:["ראשון","כן — פעם-פעמיים","כן — ותיקים"]},
            {l:"טווח גיל",k:"avgAge",opts:["עד 30","30-45","45-60","60+","מעורב"]},
            {l:"רמת פנסיוניות (1=דרוויש, 5=פנסי)",k:"luxLevel",opts:["1","2","3","4","5"]},
            {l:"יעד גיאוגרפי",k:"location",opts:["ארץ","אירופה","חו\"ל רחוק","אחר"]},
            {l:"מטרת האירוע",k:"purpose",opts:["חיבור וקרבה","חגיגה","הרפתקה","רגיעה","עסקי / מקצועי"]},
            {l:"אמצעי תשלום מועדף",k:"paymentMethod",opts:["מזומן","מזומן + ביט","העברה בנקאית","כרטיס אשראי"]},
          ].map(({l,k,opts})=>(
            <div key={k} style={{marginBottom:10}}>
              <label style={S.lbl}>{l}</label>
              <select value={q[k]} onChange={e=>setQ({...q,[k]:e.target.value})} style={{...S.sel,marginBottom:0}}>
                {opts.map(o=><option key={o}>{o}</option>)}
              </select>
            </div>
          ))}
          <label style={S.lbl}>תקציב מוערך כולל ₪</label>
          <input type="number" placeholder="0" value={q.budget} onChange={e=>setQ({...q,budget:e.target.value})} style={S.inp}/>
          <label style={S.lbl}>הערות נוספות</label>
          <textarea placeholder="כל מה שיכול לעזור..." value={q.extraNotes}
            onChange={e=>setQ({...q,extraNotes:e.target.value})} style={{...S.ta,height:50}}/>

          <div style={{display:"flex",gap:7,marginTop:4}}>
            <button onClick={()=>setStep(1)} style={{...S.gho,flex:1,marginTop:0}}>← חזרה</button>
            <button onClick={()=>setStep(3)} style={{...S.pri(ti.color),flex:2,marginTop:0}}>המשך ←</button>
          </div>
        </>}

        {/* Step 3: Members */}
        {step===3&&ti&&<>
          <div style={{fontSize:15,fontWeight:700,color:"#2c1810",marginBottom:4}}>משתתפים</div>
          <div style={{fontSize:11,color:"#aaa",marginBottom:12}}>הוסף את כל המשתתפים</div>
          {members.map((m,i)=>(
            <div key={m.id} style={{background:"#fafafa",borderRadius:10,padding:10,marginBottom:7,border:"1px solid #ede0cc"}}>
              <div style={S.row}>
                <input placeholder={`שם ${i+1}`} value={m.name} onChange={e=>updM(i,"name",e.target.value)}
                  style={{...S.inp,marginBottom:0,flex:2}}/>
                <input type="number" min="1" placeholder="נפשות" value={m.persons}
                  onChange={e=>updM(i,"persons",parseInt(e.target.value)||1)}
                  style={{...S.inp,marginBottom:0,flex:"0 0 58px",textAlign:"center"}}/>
                {splitMode==="weighted"&&(
                  <input type="number" min="1" placeholder="ימים" value={m.days||totalDays}
                    onChange={e=>updM(i,"days",parseInt(e.target.value)||1)}
                    style={{...S.inp,marginBottom:0,flex:"0 0 58px",textAlign:"center"}}/>
                )}
                {members.length>1&&<button onClick={()=>setMembers(members.filter((_,j)=>j!==i))} style={{...S.del,color:"#e74c3c"}}>✕</button>}
              </div>
            </div>
          ))}
          <button onClick={()=>setMembers([...members,{id:"m"+Date.now(),name:"",persons:1,days:parseInt(totalDays)||3}])} style={S.gho}>
            + הוסף משתתף
          </button>
          {err&&<div style={S.err}>{err}</div>}
          <div style={{display:"flex",gap:7,marginTop:4}}>
            <button onClick={()=>setStep(2)} style={{...S.gho,flex:1,marginTop:0}}>← חזרה</button>
            <button onClick={submit} disabled={saving} style={{...S.pri(ti.color),flex:2,marginTop:0}}>
              {saving?"יוצר...":"צור פרויקט 🚀"}
            </button>
          </div>
        </>}
      </div>
    </div>
  );
}

// ── Analytics Modal (super admin only) ───────────────────────
function AnalyticsModal({projects,onClose}) {
  const all = Object.values(projects);
  const byType = {};
  all.forEach(p=>{ byType[p.type]=(byType[p.type]||0)+1; });

  const totalMembers = all.reduce((s,p)=>s+(p.members?.length||0),0);
  const avgDays      = all.length ? (all.reduce((s,p)=>s+(p.totalDays||0),0)/all.length).toFixed(1) : 0;

  const luxLevels = all.map(p=>parseInt(p.questionnaire?.["רמת פנסיוניות (1-5)"])||0).filter(Boolean);
  const avgLux = luxLevels.length ? (luxLevels.reduce((s,v)=>s+v,0)/luxLevels.length).toFixed(1) : "—";

  const purposes = {};
  all.forEach(p=>{ const v=p.questionnaire?.["מטרת האירוע"]; if(v) purposes[v]=(purposes[v]||0)+1; });

  return (
    <div style={S.ov} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={S.mod}>
        <div style={{fontSize:16,fontWeight:700,color:"#2c1810",marginBottom:14}}>📊 ניתוח נתונים</div>

        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
          {[
            {l:"פרויקטים",v:all.length},
            {l:"משתתפים כולל",v:totalMembers},
            {l:"ממוצע ימים",v:avgDays},
            {l:"ממוצע פנסיוניות",v:avgLux},
          ].map(({l,v})=>(
            <div key={l} style={{flex:"0 0 calc(50% - 4px)",background:"#fdf3e6",borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
              <div style={{fontSize:11,color:"#aaa"}}>{l}</div>
              <div style={{fontSize:22,fontWeight:800,color:"#c8853a"}}>{v}</div>
            </div>
          ))}
        </div>

        <div style={{fontSize:12,fontWeight:700,color:"#555",marginBottom:6}}>לפי סוג</div>
        {Object.entries(byType).map(([k,v])=>(
          <div key={k} style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4,color:"#666"}}>
            <span>{PROJECT_TYPES[k]?.label||k}</span>
            <span style={{fontWeight:700,color:PROJECT_TYPES[k]?.color||"#888"}}>{v} פרויקטים</span>
          </div>
        ))}

        {Object.keys(purposes).length>0&&<>
          <div style={{fontSize:12,fontWeight:700,color:"#555",marginBottom:6,marginTop:12}}>לפי מטרה</div>
          {Object.entries(purposes).map(([k,v])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4,color:"#666"}}>
              <span>{k}</span><span style={{fontWeight:700,color:"#c8853a"}}>{v}</span>
            </div>
          ))}
        </>}

        <div style={{...S.card,background:"#f8f8f8",marginTop:12}}>
          <div style={{fontSize:11,color:"#888",lineHeight:1.8}}>
            <strong>מה עוד אפשר לבנות כאן:</strong><br/>
            📈 ממוצע הוצאה לנפש לפי סוג<br/>
            📍 פיזור יעדים גיאוגרפיים<br/>
            💡 המלצת תקציב לפרויקט חדש<br/>
            🔄 שיעור חזרה (קבוצות שחזרו)
          </div>
        </div>

        <button onClick={onClose} style={S.gho}>סגור</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
