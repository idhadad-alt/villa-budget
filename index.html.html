const FB   = "https://villa-budget-8fa87-default-rtdb.firebaseio.com";

// ── Calculation engine ────────────────────────────────────────
function calcProject(project, expenses, deposits) {
  const members = project.members || [];
  const expList = Object.entries(expenses||{}).sort((a,b)=>(b[1].ts||0)-(a[1].ts||0));
  const depList = Object.entries(deposits||{});

  const totalSh = expList.filter(([,e])=>e.shared&&e.type!=="refund").reduce((s,[,e])=>s+e.amount,0);

  // Weight per member based on split mode
  const getWeight = m => {
    if (project.splitMode==="equal") return 1;
    if (project.splitMode==="persons") return m.persons||1;
    if (project.splitMode==="weighted") return (m.persons||1)*((m.days||project.totalDays||1)/( project.totalDays||1));
    if (project.splitMode==="manual") return m.manualShare||0;
    return 1;
  };
  const totalW = members.reduce((s,m)=>s+getWeight(m),0);
  const cpUnit = totalW>0 ? totalSh/totalW : 0;

  const memExpShare    = m => cpUnit * getWeight(m);
  const memDeposited   = m => depList.filter(([,d])=>d.member===m.id).reduce((s,[,d])=>s+d.amount,0);
  const memPrivatePaid = m => expList.filter(([,e])=>e.paidBy===m.id&&e.source==="private"&&e.shared&&e.type!=="refund").reduce((s,[,e])=>s+e.amount,0);
  const memRefunds     = m => expList.filter(([,e])=>e.type==="refund"&&e.memberId===m.id).reduce((s,[,e])=>s+e.amount,0);
  const memContrib     = m => memDeposited(m)+memPrivatePaid(m);
  const memBalance     = m => memContrib(m)-memExpShare(m)-memRefunds(m);

  const totalDeposited   = depList.reduce((s,[,d])=>s+d.amount,0);
  const envelopeExpenses = expList.filter(([,e])=>e.source==="envelope"&&e.shared&&e.type!=="refund").reduce((s,[,e])=>s+e.amount,0);
  const refundsGiven     = expList.filter(([,e])=>e.type==="refund").reduce((s,[,e])=>s+e.amount,0);
  const envelopeBalance  = totalDeposited-envelopeExpenses-refundsGiven;
  const projectedRefunds = members.reduce((s,m)=>{const b=memBalance(m);return s+(b>0?b:0);},0);
  const netAvailable     = envelopeBalance-projectedRefunds;
  const shortfall        = totalSh-totalDeposited;

  return { members,expList,depList,totalSh,cpUnit,totalW,
           memExpShare,memDeposited,memPrivatePaid,memRefunds,memContrib,memBalance,
           envelopeBalance,totalDeposited,envelopeExpenses,refundsGiven,
           projectedRefunds,netAvailable,shortfall };
}

// ── Main App ──────────────────────────────────────────────────
function App() {

  const [adminPin, setAdminPin]   = useState(null);

  const [connErr,  setConnErr]    = useState("");

  const [pinModal,      setPinModal]      = useState(false);
  const [pinInput,      setPinInput]      = useState("");
  const [pinErr,        setPinErr]        = useState("");
  const [newProjModal,  setNewProjModal]  = useState(false);
  const [refundModal,   setRefundModal]   = useState(false);
  const [editMembModal, setEditMembModal] = useState(false);
  const [confirmDel,    setConfirmDel]    = useState(null);

  // View within project
  const [projView, setProjView]   = useState("expenses");
  const [exp, setExp] = useState({paidBy:"",amount:"",cat:"",note:"",shared:true,source:"envelope"});
  const [dep, setDep] = useState({member:"",amount:""});
  const [ref, setRef] = useState({memberId:"",amount:"",note:""});

  // ── Load ──────────────────────────────────────────────────
  const loadRoot = useCallback(async () => {
    setConnErr("");
    try {
      const root = await fbGet("kupa");
      setAdminPin(root?.adminPin||null);
      setProjects(root?.projects||{});
      if (!root?.adminPin) { setScreen("firstSetup"); }
      else { setScreen("home"); }
    } catch { setConnErr("שגיאת חיבור"); setScreen("home"); }
  }, []);

  useEffect(()=>{ loadRoot(); },[loadRoot]);

  const loadProject = useCallback(async id => {
    try {
      const [exps,deps] = await Promise.all([fbGet(`kupa_exp/${id}`),fbGet(`kupa_dep/${id}`)]);
      setExpenses(exps||{}); setDeposits(deps||{});
    } catch {}
  }, []);

  useEffect(()=>{
    if (!activeId) return;
    loadProject(activeId);
    const id=setInterval(()=>loadProject(activeId),6000);
    return ()=>clearInterval(id);
  },[activeId,loadProject]);

  // ── Auth ──────────────────────────────────────────────────
  const tryLogin = () => {
    if (pinInput===adminPin){setIsAdmin(true);setPinModal(false);setPinInput("");setPinErr("");}
    else {setPinErr("קוד שגוי");setPinInput("");}
  };

  // ── First setup ───────────────────────────────────────────
  const [setupPin, setSetupPin] = useState("");
  const [setupErr, setSetupErr] = useState("");
  const finishFirstSetup = async () => {
    if (setupPin.length<4){setSetupErr("לפחות 4 תווים");return;}
    setSaving(true);
    try {
      await fbSet("kupa",{adminPin:setupPin,projects:{}});
      setAdminPin(setupPin); setIsAdmin(true); setScreen("home");
    } catch {setSetupErr("שגיאה");} finally {setSaving(false);}
  };

  // ── Project CRUD ──────────────────────────────────────────
  const createProject = async (proj) => {
    const id = "proj_"+Date.now();
    const newProj = {...proj, id, createdAt:Date.now(), status:"active"};
    const updated = {...projects,[id]:newProj};
    await fbSet("kupa/projects",updated);
    setProjects(updated);
    return id;
  };

  const updateProject = async (id, patch) => {
    const updated = {...projects,[id]:{...projects[id],...patch}};
    await fbSet("kupa/projects",updated);
    setProjects(updated);
  };

  const archiveProject = async id => {
    await updateProject(id,{status:"archived"});
    setConfirmDel(null);
  };

  // ── Expenses ──────────────────────────────────────────────
  const addExpense = async () => {
    if (!exp.paidBy||!exp.amount||isNaN(+exp.amount)) return;
    const item={paidBy:exp.paidBy,amount:+exp.amount,cat:exp.cat||"כללי",note:exp.note,
      shared:exp.shared,source:exp.source,type:"expense",ts:Date.now(),
      time:new Date().toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"})};
    setSaving(true);
    try { const {name}=await fbPush(`kupa_exp/${activeId}`,item); setExpenses(p=>({...p,[name]:item}));
      setExp({paidBy:"",amount:"",cat:"",note:"",shared:true,source:"envelope"}); }
    catch {setConnErr("שגיאה");} finally {setSaving(false);}
  };
  const delExp = async k => { await fbDel(`kupa_exp/${activeId}/${k}`); setExpenses(p=>{const n={...p};delete n[k];return n;}); };

  // ── Deposits ──────────────────────────────────────────────
  const addDeposit = async () => {
    if (!dep.member||!dep.amount) return;
    const item={member:dep.member,amount:+dep.amount,ts:Date.now()};
    setSaving(true);
    try { const {name}=await fbPush(`kupa_dep/${activeId}`,item); setDeposits(p=>({...p,[name]:item}));
      setDep({member:"",amount:""}); }
    catch {setConnErr("שגיאה");} finally {setSaving(false);}
  };

    if (!ref.memberId||!ref.amount) return;

      time:new Date().toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"})};
    setSaving(true);
    try { const {name}=await fbPush(`kupa_exp/${activeId}`,item); setExpenses(p=>({...p,[name]:item}));

  };

  const proj = activeId ? projects[activeId] : null;

  if (screen==="loading") return (

    <div style={S.app}>

        <div style={{fontSize:48,marginBottom:8}}>💰</div>
        <div style={{fontSize:26,fontWeight:800,letterSpacing:-1}}>קופה</div>

      </div>
      <div style={{padding:16,maxWidth:420,margin:"0 auto"}}>

          <input type="password" placeholder="קוד סודי" value={setupPin} onChange={e=>setSetupPin(e.target.value)}
            style={S.inp}/>
          {setupErr&&<div style={S.err}>{setupErr}</div>}
          <button onClick={finishFirstSetup} disabled={saving} style={S.pri()}>
            {saving?"שומר...":"התחל 🚀"}
          </button>
        </div>
      </div>
    </div>
  );

    const archived = Object.values(projects).filter(p=>p.status==="archived").sort((a,b)=>b.createdAt-a.createdAt);

    return (
      <div style={S.app}>
        <div style={{background:"linear-gradient(135deg,#c8853a,#a0662a)",padding:"20px 16px 16px",color:"white"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:22,fontWeight:800,letterSpacing:-0.5}}>💰 קופה</div>
              <div style={{fontSize:11,opacity:.75,marginTop:2}}>ניהול תקציב משותף</div>
            </div>
            <button onClick={()=>{setPinModal(true);setPinErr("");setPinInput("");}}
              style={{background:"rgba(255,255,255,.2)",border:"none",color:"white",padding:"6px 14px",borderRadius:20,fontSize:12,cursor:"pointer",fontWeight:600}}>
              {isAdmin?"👑 אדמין":"🔐"}
            </button>
          </div>
        </div>

        <div style={{padding:14,maxWidth:520,margin:"0 auto"}}>
          <button onClick={()=>setNewProjModal(true)}
            style={{...S.pri(),marginBottom:16,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            <span style={{fontSize:18}}>+</span> פרויקט חדש
          </button>

          {connErr&&<div style={{...S.err,background:"#fff5f5",padding:10,borderRadius:8,marginBottom:10}}>{connErr}</div>}

          {active.length===0&&archived.length===0&&(

              אין פרויקטים עדיין<br/>לחץ "פרויקט חדש" כדי להתחיל

        {/* Edit members modal */}
        {editMembModal&&<EditMembersModal proj={proj} onClose={()=>setEditMembModal(false)}
          onSave={async members=>{ await updateProject(activeId,{members}); setEditMembModal(false); }}/>}
      </div>
    );
  }

  return null;
}

// ── New Project Modal ─────────────────────────────────────────
function NewProjectModal({ onClose, onCreate }) {
  const [step, setStep]         = useState(1);
  const [type, setType]         = useState("");
  const [name, setName]         = useState("");
  const [desc, setDesc]         = useState("");
  const [goal, setGoal]         = useState("");
  const [splitMode, setSplit]   = useState("persons");
  const [totalDays, setDays]    = useState("3");
  const [sections, setSections] = useState([]);
  const [members, setMembers]   = useState([{id:"m1",name:"",persons:1,days:3}]);
  const [saving, setSaving]     = useState(false);
  const [err, setErr]           = useState("");

  const typeInfo = PROJECT_TYPES[type];

  const selectType = t => {
    setType(t);
    setSections(PROJECT_TYPES[t].sections.map(s=>({...s,enabled:true})));
    setStep(2);
  };

  const addMember = () => setMembers([...members,{id:"m"+Date.now(),name:"",persons:1,days:parseInt(totalDays)||3}]);
  const updMember = (i,k,v) => { const n=[...members]; n[i]={...n[i],[k]:v}; setMembers(n); };
  const delMember = i => setMembers(members.filter((_,j)=>j!==i));

  const submit = async () => {
    if (!name.trim()){setErr("יש לתת שם לפרויקט");return;}
    const mems = members.filter(m=>m.name.trim()).map(m=>({...m,persons:parseInt(m.persons)||1,days:parseInt(m.days)||parseInt(totalDays)||3}));
    if (mems.length<1){setErr("יש להוסיף לפחות משתתף אחד");return;}
    setSaving(true);
    try {
      await onCreate({ type, name:name.trim(), description:desc.trim(),
        goal:goal?parseFloat(goal):null, splitMode,
        totalDays:parseInt(totalDays)||3, members:mems,
        enabledSections:sections.filter(s=>s.enabled).map(s=>s.id) });
    } catch {setErr("שגיאה");} finally {setSaving(false);}
  };

  return (
    <div style={S.ov} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={S.mod}>
        {/* Step indicator */}
        <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:14}}>
          {[1,2,3].map(s=>(
            <div key={s} style={{width:8,height:8,borderRadius:"50%",background:step>=s?"#c8853a":"#ede0cc",transition:"background .3s"}}/>
          ))}
        </div>

        {/* Step 1: Type */}
        {step===1&&<>
          <div style={{fontSize:16,fontWeight:700,color:"#2c1810",marginBottom:4,textAlign:"center"}}>סוג הפרויקט</div>
          <div style={{fontSize:12,color:"#aaa",marginBottom:14,textAlign:"center"}}>בחר את הסוג המתאים — ניתן להתאים אישית אחר כך</div>
          {Object.entries(PROJECT_TYPES).map(([k,v])=>(
            <button key={k} onClick={()=>selectType(k)}
              style={{width:"100%",background:"white",border:`2px solid ${v.color}22`,borderRadius:11,
                padding:"12px 14px",marginBottom:8,cursor:"pointer",textAlign:"right",
                display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:36,height:36,borderRadius:"50%",background:v.color+"22",
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>
                {v.label.split(" ")[0]}
              </div>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:"#2c1810"}}>{v.label.split(" ").slice(1).join(" ")}</div>
                <div style={{fontSize:11,color:"#aaa",marginTop:2}}>
                  {v.sections.length} קטגוריות
                </div>
              </div>
            </button>
          ))}
        </>}

        {/* Step 2: Details + sections */}
        {step===2&&typeInfo&&<>
          <div style={{fontSize:15,fontWeight:700,color:"#2c1810",marginBottom:10}}>פרטי הפרויקט</div>

          <div style={S.label}>שם הפרויקט *</div>
          <input placeholder='לדוגמה: "וילה מאי 2025"' value={name} onChange={e=>setName(e.target.value)} style={S.inp}/>

          <div style={S.label}>תיאור קצר (אופציונלי)</div>
          <textarea placeholder="מהות הפרויקט, מטרות..." value={desc} onChange={e=>setDesc(e.target.value)}
            style={{...S.inp,height:60,resize:"none"}}/>

          <div style={{display:"flex",gap:8}}>
            <div style={{flex:1}}>
              <div style={S.label}>יעד תקציב ₪</div>
              <input type="number" placeholder="0" value={goal} onChange={e=>setGoal(e.target.value)} style={{...S.inp}}/>
            </div>
            <div style={{flex:1}}>
              <div style={S.label}>סה"כ ימים</div>
              <input type="number" min="1" value={totalDays} onChange={e=>setDays(e.target.value)} style={{...S.inp}}/>
            </div>
          </div>

          <div style={S.label}>שיטת חלוקה</div>
          <select value={splitMode} onChange={e=>setSplit(e.target.value)} style={S.sel}>
            {SPLIT_MODES.map(m=><option key={m.id} value={m.id}>{m.label} — {m.desc}</option>)}
          </select>

          <div style={S.label}>קטגוריות הוצאות</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
            {sections.map((s,i)=>(
              <button key={s.id} onClick={()=>{const n=[...sections];n[i].enabled=!n[i].enabled;setSections(n);}}
                style={{padding:"6px 10px",borderRadius:20,border:`1px solid ${s.enabled?typeInfo.color:"#ddd"}`,
                  background:s.enabled?typeInfo.color+"22":"white",color:s.enabled?typeInfo.color:"#aaa",
                  fontSize:12,cursor:"pointer",fontWeight:s.enabled?600:400}}>
                {s.icon} {s.label}
              </button>
            ))}
          </div>

          <div style={{display:"flex",gap:8,marginTop:8}}>
            <button onClick={()=>setStep(1)} style={{...S.gho,flex:1,marginTop:0}}>← חזרה</button>
            <button onClick={()=>setStep(3)} style={{...S.pri(typeInfo.color),flex:2,marginTop:0}}>המשך ←</button>
          </div>
        </>}

        {/* Step 3: Members */}
        {step===3&&<>
          <div style={{fontSize:15,fontWeight:700,color:"#2c1810",marginBottom:4}}>משתתפים</div>
          <div style={{fontSize:11,color:"#aaa",marginBottom:12}}>הוסף את כל המשתתפים בפרויקט</div>

          {members.map((m,i)=>(
            <div key={m.id} style={{background:"#fafafa",borderRadius:10,padding:10,marginBottom:8,border:"1px solid #ede0cc"}}>
              <div style={S.row}>
                <input placeholder={`שם משתתף ${i+1}`} value={m.name}
                  onChange={e=>updMember(i,"name",e.target.value)}
                  style={{...S.inp,marginBottom:0,flex:2}}/>
                <input type="number" min="1" placeholder="נפשות" value={m.persons}
                  onChange={e=>updMember(i,"persons",parseInt(e.target.value)||1)}
                  style={{...S.inp,marginBottom:0,flex:"0 0 60px",textAlign:"center"}}/>
                {splitMode==="weighted"&&(
                  <input type="number" min="1" placeholder="ימים" value={m.days}
                    onChange={e=>updMember(i,"days",parseInt(e.target.value)||1)}
                    style={{...S.inp,marginBottom:0,flex:"0 0 60px",textAlign:"center"}}/>
                )}
                {members.length>1&&<button onClick={()=>delMember(i)} style={{...S.del,color:"#e74c3c",flexShrink:0}}>✕</button>}
              </div>
            </div>
          ))}

          <button onClick={addMember} style={S.gho}>+ הוסף משתתף</button>

          {err&&<div style={S.err}>{err}</div>}

          <div style={{display:"flex",gap:8,marginTop:8}}>
            <button onClick={()=>setStep(2)} style={{...S.gho,flex:1,marginTop:0}}>← חזרה</button>
            <button onClick={submit} disabled={saving}
              style={{...S.pri(typeInfo?.color||"#c8853a"),flex:2,marginTop:0}}>
              {saving?"יוצר...":"צור פרויקט 🚀"}
            </button>
          </div>
        </>}
      </div>
    </div>
  );
}

// ── Edit Members Modal ────────────────────────────────────────
function EditMembersModal({ proj, onClose, onSave }) {
  const [members, setMembers] = useState(proj.members.map(m=>({...m})));
  const [saving, setSaving]   = useState(false);

  const upd = (i,k,v) => { const n=[...members]; n[i]={...n[i],[k]:v}; setMembers(n); };
  const add = () => setMembers([...members,{id:"m"+Date.now(),name:"",persons:1,days:proj.totalDays||3}]);
  const del = i => setMembers(members.filter((_,j)=>j!==i));

  return (
    <div style={S.ov} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={S.mod}>
        <div style={{fontSize:15,fontWeight:700,color:"#2c1810",marginBottom:12}}>עריכת משתתפים</div>
        {members.map((m,i)=>(
          <div key={m.id} style={{background:"#fafafa",borderRadius:10,padding:10,marginBottom:8,border:"1px solid #ede0cc"}}>
            <div style={S.row}>
              <input value={m.name} onChange={e=>upd(i,"name",e.target.value)}
                style={{...S.inp,marginBottom:0,flex:2}}/>
              <input type="number" min="1" value={m.persons} onChange={e=>upd(i,"persons",parseInt(e.target.value)||1)}
                style={{...S.inp,marginBottom:0,flex:"0 0 60px",textAlign:"center"}}/>
              {members.length>1&&<button onClick={()=>del(i)} style={{...S.del,color:"#e74c3c"}}>✕</button>}
            </div>
          </div>
        ))}
        <button onClick={add} style={S.gho}>+ הוסף משתתף</button>
        <button onClick={async()=>{setSaving(true);await onSave(members);setSaving(false);}}
          disabled={saving} style={S.pri()}>
          {saving?"שומר...":"שמור ✓"}
        </button>
        <button onClick={onClose} style={S.gho}>ביטול</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
