<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>קופה</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f5f0e8;font-family:'Segoe UI','Arial Hebrew',Arial,sans-serif;direction:rtl;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.spin{animation:spin .8s linear infinite}
.fade{animation:fadeIn .25s ease}
.lift:active{transform:scale(.98)}
input:focus,select:focus,textarea:focus{border-color:#c8853a!important;outline:none}
button:disabled{opacity:.6}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef}=React;

// ─── Firebase ────────────────────────────────────────────────
const FB   ="https://villa-budget-8fa87-default-rtdb.firebaseio.com";
const furl = p=>`${FB}/${p}.json`;
const fbGet  =async p=>{const r=await fetch(furl(p));if(!r.ok)throw new Error();return r.json();};
const fbSet  =async(p,d)=>{const r=await fetch(furl(p),{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)});if(!r.ok)throw new Error();return r.json();};
const fbPush =async(p,d)=>{const r=await fetch(furl(p),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)});if(!r.ok)throw new Error();return r.json();};
const fbDel  =async p=>fetch(furl(p),{method:"DELETE"});

// ─── Config ──────────────────────────────────────────────────
const SUPER_PIN="kupa2025";

const PROJ_TYPES={
  vacation:{label:"🏖️ חופשה / וילה",   color:"#c8853a",cats:["🏠 לינה","🍽️ אוכל","🎢 פעילויות","⛽ נסיעות","🎉 שונות"]},
  event:   {label:"🎉 אירוע / חגיגה",   color:"#8e44ad",cats:["🏛️ מקום","🍽️ קייטרינג","🎊 עיצוב","🎵 מוזיקה","🎉 שונות"]},
  construction:{label:"🔨 בנייה / שיפוץ",color:"#27ae60",cats:["🧱 חומרים","👷 עבודה","📐 תכנון","📋 היתרים","🔧 שונות"]},
  trip:    {label:"✈️ טיול קבוצתי",     color:"#2980b9",cats:["✈️ טיסות","🏨 לינה","🍽️ אוכל","🗺️ סיורים","🚌 תחבורה","🎒 שונות"]},
  custom:  {label:"⚙️ מותאם אישית",     color:"#7f8c8d",cats:["📦 כללי","🎉 שונות"]},
};
const SPLIT_MODES=[
  {id:"equal",   label:"חלקים שווים"},
  {id:"persons", label:"לפי נפשות"},
  {id:"weighted",label:"נפשות × ימים"},
];

// ─── Styles ──────────────────────────────────────────────────
const G=(c="#c8853a")=>`linear-gradient(135deg,${c},${c}cc)`;
const S={
  app:  {minHeight:"100vh",background:"#f5f0e8"},
  ctr:  {display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",height:"100vh",background:"#f5f0e8"},
  sp:   {width:36,height:36,border:"3px solid #d4a96a",borderTopColor:"transparent",borderRadius:"50%"},
  card: {background:"white",borderRadius:14,padding:14,marginBottom:10,boxShadow:"0 2px 10px rgba(0,0,0,.06)"},
  inp:  {border:"2px solid #ede0cc",borderRadius:9,padding:"9px 10px",fontSize:13,background:"#fafafa",width:"100%",marginBottom:8},
  sel:  {border:"2px solid #ede0cc",borderRadius:9,padding:"9px 10px",fontSize:13,background:"#fafafa",width:"100%",marginBottom:8},
  ta:   {border:"2px solid #ede0cc",borderRadius:9,padding:"9px 10px",fontSize:13,background:"#fafafa",width:"100%",marginBottom:8,resize:"none"},
  row:  {display:"flex",gap:8,marginBottom:8,alignItems:"center"},
  lbl:  {fontSize:11,color:"#888",marginBottom:4,fontWeight:600,display:"block"},
  err:  {color:"#e74c3c",fontSize:12,textAlign:"center",marginBottom:6},
  ov:   {position:"fixed",inset:0,background:"rgba(0,0,0,.6)",display:"flex",justifyContent:"center",alignItems:"center",zIndex:100,padding:12},
  mod:  {background:"white",borderRadius:18,padding:18,width:"100%",maxWidth:420,maxHeight:"90vh",overflowY:"auto"},
  del:  {background:"none",border:"none",color:"#ddd",fontSize:12,cursor:"pointer",padding:"3px 5px",flexShrink:0},
  pri:  (c="#c8853a")=>({width:"100%",background:G(c),color:"white",border:"none",borderRadius:11,padding:12,fontSize:14,fontWeight:700,cursor:"pointer",marginTop:4}),
  sec:  (c="#3498db")=>({width:"100%",background:c+"22",color:c,border:"none",borderRadius:11,padding:10,fontSize:13,fontWeight:600,cursor:"pointer",marginTop:5}),
  gho:  {width:"100%",background:"transparent",border:"2px dashed #d4a96a",color:"#c8853a",borderRadius:9,padding:9,fontSize:13,fontWeight:600,cursor:"pointer",marginTop:4},
  pill: c=>({background:c+"22",color:c,padding:"2px 9px",borderRadius:20,fontSize:11,fontWeight:600,display:"inline-block"}),
};

// ─── Calc ────────────────────────────────────────────────────
function calc(proj,expenses,deposits){
  const members=proj?.members||[];
  const expList=Object.entries(expenses||{}).sort((a,b)=>(b[1].ts||0)-(a[1].ts||0));
  const depList=Object.entries(deposits||{});
  const w=m=>proj.splitMode==="equal"?1:proj.splitMode==="persons"?(m.persons||1):(m.persons||1)*((m.days||proj.totalDays||1)/(proj.totalDays||1));
  const totalW=members.reduce((s,m)=>s+w(m),0);
  const totalSh=expList.filter(([,e])=>e.shared&&e.type!=="refund").reduce((s,[,e])=>s+e.amount,0);
  const cpu=totalW>0?totalSh/totalW:0;
  const mDep =m=>depList.filter(([,d])=>d.member===m.id).reduce((s,[,d])=>s+d.amount,0);
  const mPriv=m=>expList.filter(([,e])=>e.paidBy===m.id&&e.source==="private"&&e.shared&&e.type!=="refund").reduce((s,[,e])=>s+e.amount,0);
  const mRef =m=>expList.filter(([,e])=>e.type==="refund"&&e.memberId===m.id).reduce((s,[,e])=>s+e.amount,0);
  const mShare=m=>cpu*w(m);
  const mContrib=m=>mDep(m)+mPriv(m);
  const mBal=m=>mContrib(m)-mShare(m)-mRef(m);
  const totDep=depList.reduce((s,[,d])=>s+d.amount,0);
  const envExp=expList.filter(([,e])=>e.source==="envelope"&&e.shared&&e.type!=="refund").reduce((s,[,e])=>s+e.amount,0);
  const refGiven=expList.filter(([,e])=>e.type==="refund").reduce((s,[,e])=>s+e.amount,0);
  const envBal=totDep-envExp-refGiven;
  const projRef=members.reduce((s,m)=>{const b=mBal(m);return s+(b>0?b:0);},0);
  return{members,expList,depList,totalSh,cpu,totalW,w,mDep,mPriv,mRef,mShare,mContrib,mBal,
    envBal,totDep,envExp,refGiven,projRef,netAv:envBal-projRef,shortfall:totalSh-totDep};
}

// ─── Generate access code ────────────────────────────────────
function genCode(){
  const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  return Array.from({length:8},()=>chars[Math.floor(Math.random()*chars.length)]).join("");
}

// ════════════════════════════════════════════════════════════
function App(){
  const [loading,setLoading]=useState(true);
  const [screen, setScreen] =useState("login"); // login|super|code-entry|setup|project
  const [projects,setProjects]=useState({});
  const [codes,   setCodes]  =useState({});     // {code:{used,projId,createdAt}}
  const [activeId,setActiveId]=useState(null);
  const [expenses,setExpenses]=useState({});
  const [deposits,setDeposits]=useState({});
  const [saving,  setSaving] =useState(false);
  const [connErr, setConnErr]=useState("");

  // Auth
  const [pinInput,setPinInput]=useState("");
  const [pinErr,  setPinErr]  =useState("");
  const [codeInput,setCodeInput]=useState("");
  const [codeErr,  setCodeErr] =useState("");

  // Modals
  const [refModal,   setRefModal]  =useState(false);
  const [editMModal, setEditMModal]=useState(false);
  const [feedbackM,  setFeedbackM] =useState(false);
  const [reportM,    setReportM]   =useState(false);
  const [analyticsM, setAnalyticsM]=useState(false);

  // Project view
  const [pView,setPView]=useState("expenses");
  const [exp,setExp]=useState({paidBy:"",amount:"",cat:"",note:"",shared:true,source:"envelope"});
  const [dep,setDep]=useState({member:"",amount:""});
  const [ref,setRef]=useState({memberId:"",amount:"",note:""});

  // ── Load ──────────────────────────────────────────────────
  useEffect(()=>{
    (async()=>{
      try{
        const data=await fbGet("kupa3");
        setProjects(data?.projects||{});
        setCodes(data?.codes||{});
      }catch{setConnErr("שגיאת חיבור");}
      setLoading(false);
    })();
  },[]);

  const loadProject=useCallback(async id=>{
    try{
      const[e,d]=await Promise.all([fbGet(`kupa3_exp/${id}`),fbGet(`kupa3_dep/${id}`)]);
      setExpenses(e||{});setDeposits(d||{});
    }catch{}
  },[]);

  useEffect(()=>{
    if(!activeId)return;
    loadProject(activeId);
    const id=setInterval(()=>loadProject(activeId),6000);
    return()=>clearInterval(id);
  },[activeId,loadProject]);

  // ── Super admin login ────────────────────────────────────
  const superLogin=()=>{
    if(pinInput===SUPER_PIN){setScreen("super");setPinInput("");setPinErr("");}
    else{setPinErr("קוד שגוי");setPinInput("");}
  };

  // ── Generate code ────────────────────────────────────────
  const generateCode=async()=>{
    const code=genCode();
    const newCodes={...codes,[code]:{used:false,createdAt:Date.now()}};
    await fbSet("kupa3/codes",newCodes);
    setCodes(newCodes);
    return code;
  };

  // ── Code entry (group admin) ─────────────────────────────
  const enterCode=async()=>{
    const c=codeInput.trim().toUpperCase();
    if(!codes[c]){setCodeErr("קוד לא נמצא");return;}
    if(codes[c].used){
      // Code already used — go to project
      const projId=codes[c].projId;
      if(projId&&projects[projId]){
        setActiveId(projId);setPView("expenses");setScreen("project");
      }else{setCodeErr("הקוד שומש אך הפרויקט לא נמצא");}
      return;
    }
    // Fresh code — go to setup
    setCodeInput(c);setCodeErr("");setScreen("setup");
  };

  // ── Create project (group admin) ─────────────────────────
  const createProject=async proj=>{
    const id="p"+Date.now();
    const newP={...proj,id,createdAt:Date.now(),status:"active",accessCode:codeInput};
    const updP={...projects,[id]:newP};
    const updC={...codes,[codeInput]:{...codes[codeInput],used:true,projId:id}};
    await fbSet("kupa3/projects",updP);
    await fbSet("kupa3/codes",updC);
    setProjects(updP);setCodes(updC);
    setActiveId(id);setPView("expenses");setScreen("project");
  };

  // ── Update project ───────────────────────────────────────
  const updateProject=async(id,patch)=>{
    const updP={...projects,[id]:{...projects[id],...patch}};
    await fbSet("kupa3/projects",updP);
    setProjects(updP);
  };

  // ── Archive/delete ───────────────────────────────────────
  const archiveProject=async id=>{await updateProject(id,{status:"archived"});};
  const deleteProject =async id=>{
    const n={...projects};delete n[id];
    await fbSet("kupa3/projects",n);
    await fbDel(`kupa3_exp/${id}`);await fbDel(`kupa3_dep/${id}`);
    setProjects(n);
  };

  // ── Expenses ─────────────────────────────────────────────
  const addExpense=async()=>{
    if(!exp.paidBy||!exp.amount||isNaN(+exp.amount))return;
    const item={paidBy:exp.paidBy,amount:+exp.amount,cat:exp.cat||"כללי",
      note:exp.note,shared:exp.shared,source:exp.source,type:"expense",
      ts:Date.now(),time:new Date().toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"})};
    setSaving(true);
    try{
      const{name}=await fbPush(`kupa3_exp/${activeId}`,item);
      setExpenses(p=>({...p,[name]:item}));
      setExp({paidBy:"",amount:"",cat:"",note:"",shared:true,source:"envelope"});
    }catch{setConnErr("שגיאה");}finally{setSaving(false);}
  };
  const delExp=async k=>{await fbDel(`kupa3_exp/${activeId}/${k}`);setExpenses(p=>{const n={...p};delete n[k];return n;});};

  // ── Deposits ─────────────────────────────────────────────
  const addDeposit=async()=>{
    if(!dep.member||!dep.amount)return;
    const item={member:dep.member,amount:+dep.amount,ts:Date.now()};
    setSaving(true);
    try{
      const{name}=await fbPush(`kupa3_dep/${activeId}`,item);
      setDeposits(p=>({...p,[name]:item}));
      setDep({member:"",amount:""});
    }catch{setConnErr("שגיאה");}finally{setSaving(false);}
  };
  const delDep=async k=>{await fbDel(`kupa3_dep/${activeId}/${k}`);setDeposits(p=>{const n={...p};delete n[k];return n;});};

  // ── Refund ───────────────────────────────────────────────
  const addRefund=async()=>{
    if(!ref.memberId||!ref.amount)return;
    const item={type:"refund",memberId:ref.memberId,amount:+ref.amount,
      note:ref.note||"החזר",paidBy:"קופה",source:"envelope",shared:false,
      ts:Date.now(),time:new Date().toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"})};
    setSaving(true);
    try{
      const{name}=await fbPush(`kupa3_exp/${activeId}`,item);
      setExpenses(p=>({...p,[name]:item}));
      setRef({memberId:"",amount:"",note:""});setRefModal(false);
    }catch{setConnErr("שגיאה");}finally{setSaving(false);}
  };

  const proj   =activeId?projects[activeId]:null;
  const Calc   =proj?calc(proj,expenses,deposits):null;
  const pCol   =proj?(PROJ_TYPES[proj.type]?.color||"#c8853a"):"#c8853a";
  const mName  =id=>proj?.members?.find(m=>m.id===id)?.name||id;
  const cats   =proj?(PROJ_TYPES[proj.type]?.cats||["כללי"]):[];

  if(loading)return(
    <div style={S.ctr}><div className="spin" style={S.sp}/><div style={{color:"#c8853a",marginTop:12,fontSize:14,fontWeight:600}}>טוען...</div></div>
  );

  // ════════════════════════════════════════════════════════
  // LOGIN SCREEN
  // ════════════════════════════════════════════════════════
  if(screen==="login")return(
    <div style={S.app}>
      <div style={{background:G(),padding:"48px 20px 32px",color:"white",textAlign:"center"}}>
        <div style={{fontSize:56,marginBottom:10}}>💰</div>
        <div style={{fontSize:30,fontWeight:800,letterSpacing:-1}}>קופה</div>
        <div style={{fontSize:13,opacity:.8,marginTop:4}}>ניהול תקציב משותף</div>
      </div>
      <div style={{padding:16,maxWidth:380,margin:"0 auto"}}>
        <div style={S.card}>
          <div style={{fontSize:14,fontWeight:700,color:"#2c1810",marginBottom:3}}>יש לך קוד גישה?</div>
          <div style={{fontSize:11,color:"#aaa",marginBottom:12}}>הזן את הקוד שקיבלת מהמפעיל</div>
          <input placeholder="קוד גישה (8 תווים)" value={codeInput}
            onChange={e=>setCodeInput(e.target.value.toUpperCase())}
            onKeyDown={e=>e.key==="Enter"&&enterCode()}
            style={{...S.inp,textAlign:"center",fontSize:18,letterSpacing:4,fontWeight:700}}/>
          {codeErr&&<div style={S.err}>{codeErr}</div>}
          <button onClick={enterCode} style={S.pri()}>כניסה עם קוד →</button>
        </div>
        <button onClick={()=>setScreen("super-login")}
          style={{background:"none",border:"none",color:"#bbb",fontSize:11,cursor:"pointer",width:"100%",marginTop:8,textAlign:"center"}}>
          כניסת מפעיל
        </button>
      </div>
    </div>
  );

  // ── Super admin login ────────────────────────────────────
  if(screen==="super-login")return(
    <div style={S.app}>
      <div style={{background:"linear-gradient(135deg,#2c3e50,#1a252f)",padding:"40px 20px 28px",color:"white",textAlign:"center"}}>
        <div style={{fontSize:40,marginBottom:8}}>👑</div>
        <div style={{fontSize:22,fontWeight:800}}>כניסת מפעיל</div>
      </div>
      <div style={{padding:16,maxWidth:360,margin:"0 auto"}}>
        <div style={S.card}>
          <input type="password" placeholder="קוד מפעיל" value={pinInput}
            onChange={e=>setPinInput(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&superLogin()}
            style={{...S.inp,textAlign:"center",fontSize:22,letterSpacing:8}} autoFocus/>
          {pinErr&&<div style={S.err}>{pinErr}</div>}
          <button onClick={superLogin} style={{...S.pri("#2c3e50")}}>כנס</button>
          <button onClick={()=>setScreen("login")} style={S.gho}>חזרה</button>
        </div>
      </div>
    </div>
  );

  // ════════════════════════════════════════════════════════
  // SUPER ADMIN DASHBOARD
  // ════════════════════════════════════════════════════════
  if(screen==="super"){
    const active  =Object.values(projects).filter(p=>p.status==="active").sort((a,b)=>b.createdAt-a.createdAt);
    const archived=Object.values(projects).filter(p=>p.status==="archived").sort((a,b)=>b.createdAt-a.createdAt);
    const unusedCodes=Object.entries(codes).filter(([,v])=>!v.used);
    const usedCodes  =Object.entries(codes).filter(([,v])=>v.used);

    return(
      <div style={S.app}>
        <div style={{background:"linear-gradient(135deg,#2c3e50,#1a252f)",padding:"18px 14px 14px",color:"white"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:20,fontWeight:800}}>👑 לוח מפעיל</div>
              <div style={{fontSize:11,opacity:.7,marginTop:2}}>קופה — ניהול עליון</div>
            </div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>setAnalyticsM(true)}
                style={{background:"rgba(255,255,255,.15)",border:"none",color:"white",padding:"5px 10px",borderRadius:14,fontSize:11,cursor:"pointer"}}>
                📊 ניתוח
              </button>
              <button onClick={()=>setScreen("login")}
                style={{background:"rgba(255,255,255,.1)",border:"none",color:"white",padding:"5px 10px",borderRadius:14,fontSize:11,cursor:"pointer"}}>
                יציאה
              </button>
            </div>
          </div>
        </div>

        <div style={{padding:14,maxWidth:520,margin:"0 auto"}}>
          {connErr&&<div style={{...S.err,background:"#fff5f5",padding:10,borderRadius:8,marginBottom:10}}>{connErr}</div>}

          {/* Stats row */}
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            {[{l:"פרויקטים פעילים",v:active.length,c:"#c8853a"},
              {l:"קודים פנויים",v:unusedCodes.length,c:"#27ae60"},
              {l:"קודים בשימוש",v:usedCodes.length,c:"#2980b9"}]
              .map(x=>(
              <div key={x.l} style={{flex:1,background:"white",borderRadius:11,padding:"10px",textAlign:"center",boxShadow:"0 1px 6px rgba(0,0,0,.06)",borderTop:`3px solid ${x.c}`}}>
                <div style={{fontSize:22,fontWeight:800,color:x.c}}>{x.v}</div>
                <div style={{fontSize:10,color:"#aaa",marginTop:2}}>{x.l}</div>
              </div>
            ))}
          </div>

          {/* Generate code */}
          <GenerateCodeBlock onGenerate={generateCode} unusedCodes={unusedCodes}/>

          {/* Active projects */}
          {active.length>0&&<>
            <div style={{fontSize:11,color:"#aaa",fontWeight:600,marginBottom:7}}>פרויקטים פעילים</div>
            {active.map(p=>{
              const ti=PROJ_TYPES[p.type]||PROJ_TYPES.custom;
              return(
                <div key={p.id} style={{...S.card,borderRight:`4px solid ${ti.color}`,padding:"12px 14px",marginBottom:7}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14,fontWeight:700,color:"#2c1810"}}>{p.name}</div>
                      <div style={{fontSize:11,color:"#aaa",marginTop:2}}>
                        {ti.label} · {p.members?.length||0} משתתפים · קוד: <strong>{p.accessCode}</strong>
                      </div>
                      {p.questionnaire&&<div style={{fontSize:10,color:"#aaa",marginTop:3}}>
                        {Object.entries(p.questionnaire).slice(0,3).map(([k,v])=>`${k}: ${v}`).join(" · ")}
                      </div>}
                    </div>
                    <div style={{display:"flex",gap:5,flexDirection:"column",alignItems:"flex-end"}}>
                      <span style={S.pill(ti.color)}>{p.members?.length||0} 👥</span>
                      <button onClick={async()=>{await archiveProject(p.id);}}
                        style={{background:"#fff3e0",border:"none",color:"#e67e22",borderRadius:6,padding:"3px 8px",fontSize:10,cursor:"pointer"}}>
                        ארכיון
                      </button>
                    </div>
                  </div>
                </div>
              );
            })}
          </>}

          {/* Archived */}
          {archived.length>0&&<>
            <div style={{fontSize:11,color:"#aaa",fontWeight:600,marginBottom:7,marginTop:8}}>ארכיון</div>
            {archived.map(p=>{
              const ti=PROJ_TYPES[p.type]||PROJ_TYPES.custom;
              return(

// ── Generate code block ───────────────────────────────────────
function GenerateCodeBlock({onGenerate,unusedCodes}){
  const [lastCode,setLastCode]=useState("");
  const [loading, setLoading]=useState(false);
  const gen=async()=>{
    setLoading(true);
    const c=await onGenerate();
    setLastCode(c);setLoading(false);
  };
  return(
    <div style={{...S.card,border:"2px solid #c8853a",background:"#fffbf5",marginBottom:14}}>
      <div style={{fontSize:13,fontWeight:700,color:"#c8853a",marginBottom:6}}>🎟️ יצירת קוד גישה חדש</div>
      <div style={{fontSize:11,color:"#888",marginBottom:10,lineHeight:1.6}}>
        כל קוד מאפשר לאדמין קבוצה אחד לפתוח פרויקט חדש. לאחר השימוש הקוד נעול לאותו פרויקט.
      </div>
      <button onClick={gen} disabled={loading} style={S.pri()}>
        {loading?"מייצר...":"+ צור קוד גישה חדש"}
      </button>
      {lastCode&&(
        <div style={{marginTop:10,background:"white",borderRadius:10,padding:12,textAlign:"center",border:"1px solid #ede0cc"}}>
          <div style={{fontSize:11,color:"#aaa",marginBottom:5}}>הקוד החדש — שלח לאדמין הקבוצה:</div>
          <div style={{fontSize:28,fontWeight:800,letterSpacing:4,color:"#c8853a",fontFamily:"monospace"}}>{lastCode}</div>
          <button onClick={()=>navigator.clipboard.writeText(lastCode)}
            style={{background:"#fdf3e6",border:"none",color:"#c8853a",borderRadius:8,padding:"5px 14px",fontSize:12,cursor:"pointer",marginTop:8}}>
            📋 העתק קוד
          </button>
        </div>
      )}
      {unusedCodes.length>0&&(
        <div style={{marginTop:8,fontSize:11,color:"#aaa"}}>
          קודים פנויים: {unusedCodes.map(([c])=><span key={c} style={{background:"#f0f0f0",borderRadius:5,padding:"1px 6px",marginRight:4,fontFamily:"monospace"}}>{c}</span>)}
        </div>
      )}
    </div>
  );
}

  const [name,      setName]     =useState("");
  const [desc,      setDesc]     =useState("");
  const [splitMode, setSplit]    =useState("persons");
  const [totalDays, setTotalDays]=useState("3");
  const [goal,      setGoal]     =useState("");

  const [q,setQ]=useState({
    groupType:"משפחות עם ילדים",priorEvents:"ראשון",
    avgAge:"30-45",luxLevel:"3",location:"ארץ",
    purpose:"חיבור וקרבה",paymentMethod:"מזומן + ביט",
    budget:"",extraNotes:""
  });

  const [members,setMembers]=useState([{id:"m1",name:"",persons:1}]);
  const ti=PROJ_TYPES[type];
  const updM=(i,k,v)=>{const n=[...members];n[i]={...n[i],[k]:v};setMembers(n);};

  const submit=async()=>{
    const mems=members.filter(m=>m.name.trim()).map(m=>({...m,persons:parseInt(m.persons)||1}));
    if(mems.length<1){setErr("יש להוסיף לפחות משתתף אחד");return;}
    setSaving(true);
    try{
      await onCreate({type,name:name.trim(),description:desc.trim(),
        splitMode,totalDays:parseInt(totalDays)||3,goal:goal?parseFloat(goal):null,
        members:mems,
        questionnaire:{
          "סוג קבוצה":q.groupType,"אירועים קודמים":q.priorEvents,
          "טווח גיל":q.avgAge,"רמת פנסיוניות (1-5)":q.luxLevel,
          "יעד גיאוגרפי":q.location,"מטרת האירוע":q.purpose,
          "אמצעי תשלום":q.paymentMethod,
          ...(q.budget?{"תקציב מוערך":q.budget}:{}),
          ...(q.extraNotes?{"הערות":q.extraNotes}:{}),
        }
      });
    }catch{setErr("שגיאה");}finally{setSaving(false);}
  };

  return(
    <div style={S.app}>
      <div style={{background:G(ti?.color||"#c8853a"),padding:"16px 14px 12px",color:"white"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
          <button onClick={onBack}
            style={{background:"rgba(255,255,255,.2)",border:"none",color:"white",padding:"4px 9px",borderRadius:13,fontSize:11,cursor:"pointer"}}>
            ← חזרה
          </button>
          <div>
            <div style={{fontSize:15,fontWeight:700}}>פתיחת פרויקט חדש</div>
            <div style={{fontSize:10,opacity:.75}}>קוד גישה: {code}</div>
          </div>
        </div>
        <div style={{display:"flex",justifyContent:"center",gap:8}}>
          {[1,2,3].map(s=>(
            <div key={s} style={{display:"flex",alignItems:"center",gap:4}}>
              <div style={{width:24,height:24,borderRadius:"50%",
                background:step>=s?"white":"rgba(255,255,255,.3)",
                color:step>=s?(ti?.color||"#c8853a"):"white",
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:12,fontWeight:700}}>
                {s}
              </div>
              {s<3&&<div style={{width:20,height:2,background:"rgba(255,255,255,.3)"}}/>}
            </div>
          ))}
        </div>
      </div>

      <div style={{padding:14,maxWidth:480,margin:"0 auto"}}>

        {/* Step 1 */}
        {step===1&&<div className="fade">
          <div style={{...S.card}}>
            <div style={{fontSize:14,fontWeight:700,color:"#2c1810",marginBottom:12}}>סוג הפרויקט ופרטים</div>
            {!type&&<>
              <div style={S.lbl}>בחר סוג:</div>
              {Object.entries(PROJ_TYPES).map(([k,v])=>(
                <button key={k} onClick={()=>setType(k)}
                  style={{width:"100%",background:"white",border:`2px solid ${v.color}33`,borderRadius:11,
                    padding:"11px 13px",marginBottom:7,cursor:"pointer",textAlign:"right",
                    display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:32,height:32,borderRadius:"50%",background:v.color+"22",
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>
                    {v.label.split(" ")[0]}
                  </div>
                  <div style={{fontSize:13,fontWeight:700,color:"#2c1810"}}>{v.label.split(" ").slice(1).join(" ")}</div>
                </button>
              ))}
            </>}
            {type&&ti&&<>
              <button onClick={()=>setType("")}
                style={{background:"none",border:"none",color:ti.color,fontSize:12,cursor:"pointer",marginBottom:8,fontWeight:600}}>
                {ti.label} ← שנה
              </button>
              <label style={S.lbl}>שם הפרויקט *</label>
              <input placeholder='לדוגמה: "וילה יוני 2025"' value={name} onChange={e=>setName(e.target.value)} style={S.inp}/>
              <label style={S.lbl}>תיאור (אופציונלי)</label>
              <textarea placeholder="מהות הפרויקט..." value={desc} onChange={e=>setDesc(e.target.value)} style={{...S.ta,height:50}}/>
              <div style={S.row}>
                <div style={{flex:1}}>
                  <label style={S.lbl}>ימים</label>
                  <input type="number" min="1" value={totalDays} onChange={e=>setTotalDays(e.target.value)} style={{...S.inp,marginBottom:0}}/>
                </div>
                <div style={{flex:1}}>
                  <label style={S.lbl}>יעד תקציב ₪</label>
                  <input type="number" value={goal} onChange={e=>setGoal(e.target.value)} style={{...S.inp,marginBottom:0}}/>
                </div>
              </div>
              <label style={{...S.lbl,marginTop:8}}>שיטת חלוקה</label>
              <select value={splitMode} onChange={e=>setSplit(e.target.value)} style={S.sel}>
                {SPLIT_MODES.map(m=><option key={m.id} value={m.id}>{m.label}</option>)}
              </select>
              {err&&<div style={S.err}>{err}</div>}
              <button onClick={()=>{if(!name.trim()){setErr("יש לתת שם לפרויקט");return;}setErr("");setStep(2);}}
                style={S.pri(ti.color)}>המשך ←</button>
            </>}
          </div>
        </div>}

        {/* Step 2 — questionnaire */}
        {step===2&&ti&&<div className="fade">
          <div style={S.card}>
            <div style={{fontSize:14,fontWeight:700,color:"#2c1810",marginBottom:4}}>📋 שאלון הפרויקט</div>
            <div style={{fontSize:11,color:"#aaa",marginBottom:12}}>המידע ישמש לשיפור האפליקציה ולמתן המלצות</div>
            {[
              {l:"סוג הקבוצה",k:"groupType",opts:["זוגות בלבד","משפחות עם ילדים","חברים ללא ילדים","מעורב","עמיתים לעבודה"]},
              {l:"אירועים קודמים יחד?",k:"priorEvents",opts:["ראשון","פעם-פעמיים","ותיקים"]},
              {l:"טווח גיל עיקרי",k:"avgAge",opts:["עד 30","30-45","45-60","60+","מעורב"]},
              {l:"רמת פנסיוניות (1=דרוויש, 5=פנסי)",k:"luxLevel",opts:["1","2","3","4","5"]},
              {l:"יעד גיאוגרפי",k:"location",opts:["ארץ","אירופה","חו\"ל רחוק","אחר"]},
              {l:"מטרת האירוע",k:"purpose",opts:["חיבור וקרבה","חגיגה","הרפתקה","רגיעה","עסקי"]},
              {l:"אמצעי תשלום מועדף",k:"paymentMethod",opts:["מזומן","מזומן + ביט","העברה","כרטיס"]},
            ].map(({l,k,opts})=>(
              <div key={k} style={{marginBottom:10}}>
                <label style={S.lbl}>{l}</label>
                <select value={q[k]} onChange={e=>setQ({...q,[k]:e.target.value})} style={{...S.sel,marginBottom:0}}>
                  {opts.map(o=><option key={o}>{o}</option>)}
                </select>
              </div>
            ))}
            <label style={S.lbl}>תקציב מוערך כולל ₪</label>
            <input type="number" placeholder="0" value={q.budget} onChange={e=>setQ({...q,budget:e.target.value})} style={S.inp}/>
            <label style={S.lbl}>הערות נוספות</label>
            <textarea placeholder="כל מה שרלוונטי..." value={q.extraNotes}
              onChange={e=>setQ({...q,extraNotes:e.target.value})} style={{...S.ta,height:50}}/>
            <div style={{display:"flex",gap:7,marginTop:4}}>
              <button onClick={()=>setStep(1)} style={{...S.gho,flex:1,marginTop:0}}>← חזרה</button>
              <button onClick={()=>setStep(3)} style={{...S.pri(ti.color),flex:2,marginTop:0}}>המשך ←</button>
            </div>
          </div>
        </div>}

        {/* Step 3 — members */}
        {step===3&&ti&&<div className="fade">
          <div style={S.card}>
            <div style={{fontSize:14,fontWeight:700,color:"#2c1810",marginBottom:4}}>משתתפים</div>
            <div style={{fontSize:11,color:"#aaa",marginBottom:12}}>שם + מספר נפשות לכל משתתף</div>
            {members.map((m,i)=>(
              <div key={m.id} style={{background:"#fafafa",borderRadius:10,padding:10,marginBottom:7,border:"1px solid #ede0cc"}}>
                <div style={S.row}>
                  <input placeholder={`שם ${i+1}`} value={m.name} onChange={e=>updM(i,"name",e.target.value)}
                    style={{...S.inp,marginBottom:0,flex:2}}/>
                  <input type="number" min="1" placeholder="נפשות" value={m.persons}
                    onChange={e=>updM(i,"persons",parseInt(e.target.value)||1)}
                    style={{...S.inp,marginBottom:0,flex:"0 0 58px",textAlign:"center"}}/>
                  {members.length>1&&<button onClick={()=>setMembers(members.filter((_,j)=>j!==i))}
                    style={{...S.del,color:"#e74c3c"}}>✕</button>}
                </div>
              </div>
            ))}
            <button onClick={()=>setMembers([...members,{id:"m"+Date.now(),name:"",persons:1}])} style={S.gho}>
              + הוסף משתתף
            </button>
            {err&&<div style={S.err}>{err}</div>}
            <div style={{display:"flex",gap:7,marginTop:4}}>
              <button onClick={()=>setStep(2)} style={{...S.gho,flex:1,marginTop:0}}>← חזרה</button>
              <button onClick={submit} disabled={saving} style={{...S.pri(ti.color),flex:2,marginTop:0}}>
                {saving?"יוצר...":"פתח פרויקט 🚀"}
              </button>
            </div>
          </div>
        </div>}
      </div>
    </div>
  );
}

// ── Analytics Modal ───────────────────────────────────────────
function AnalyticsModal({projects,onClose}){
  const all=Object.values(projects);
  const active=all.filter(p=>p.status==="active");
  const byType={};
  all.forEach(p=>{byType[p.type]=(byType[p.type]||0)+1;});
  const avgDays=all.length?(all.reduce((s,p)=>s+(p.totalDays||0),0)/all.length).toFixed(1):0;
  const luxVals=all.map(p=>parseInt(p.questionnaire?.["רמת פנסיוניות (1-5)"])||0).filter(Boolean);
  const avgLux=luxVals.length?(luxVals.reduce((s,v)=>s+v,0)/luxVals.length).toFixed(1):"—";
  const purposes={};
  all.forEach(p=>{const v=p.questionnaire?.["מטרת האירוע"];if(v)purposes[v]=(purposes[v]||0)+1;});
  const locations={};
  all.forEach(p=>{const v=p.questionnaire?.["יעד גיאוגרפי"];if(v)locations[v]=(locations[v]||0)+1;});

  // Feedback averages
  const withFeedback=all.filter(p=>p.feedback);
  const fbAvg=key=>{
    const vals=withFeedback.map(p=>p.feedback[key]).filter(v=>v&&!isNaN(v));
    return vals.length?(vals.reduce((s,v)=>s+ +v,0)/vals.length).toFixed(1):"—";
  };

  return(
    <div style={S.ov} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={S.mod}>
        <div style={{fontSize:16,fontWeight:700,color:"#2c1810",marginBottom:14}}>📊 ניתוח נתונים</div>

        <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:14}}>
          {[{l:"כלל הפרויקטים",v:all.length,c:"#c8853a"},
            {l:"פעילים",v:active.length,c:"#27ae60"},
            {l:"ממוצע ימים",v:avgDays,c:"#2980b9"},
            {l:"פנסיוניות ממוצעת",v:avgLux,c:"#8e44ad"}]
            .map(x=>(
            <div key={x.l} style={{flex:"0 0 calc(50% - 4px)",background:"white",borderRadius:10,padding:"10px",textAlign:"center",border:`2px solid ${x.c}22`}}>
              <div style={{fontSize:22,fontWeight:800,color:x.c}}>{x.v}</div>
              <div style={{fontSize:10,color:"#aaa",marginTop:2}}>{x.l}</div>
            </div>
          ))}
        </div>

        {Object.keys(byType).length>0&&<>
          <div style={{fontSize:12,fontWeight:700,color:"#555",marginBottom:7}}>לפי סוג פרויקט</div>
          {Object.entries(byType).map(([k,v])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
              <span style={{fontSize:12,color:"#666"}}>{PROJ_TYPES[k]?.label||k}</span>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{width:Math.max(8,v*20),height:8,background:PROJ_TYPES[k]?.color||"#888",borderRadius:4}}/>
                <span style={{fontSize:12,fontWeight:700,color:PROJ_TYPES[k]?.color||"#888"}}>{v}</span>
              </div>
            </div>
          ))}
        </>}

        {Object.keys(purposes).length>0&&<>
          <div style={{fontSize:12,fontWeight:700,color:"#555",marginBottom:7,marginTop:12}}>לפי מטרה</div>
          {Object.entries(purposes).map(([k,v])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4,color:"#666"}}>
              <span>{k}</span><span style={{fontWeight:700,color:"#c8853a"}}>{v}</span>
            </div>
          ))}
        </>}

        {withFeedback.length>0&&<>
          <div style={{fontSize:12,fontWeight:700,color:"#555",marginBottom:7,marginTop:12}}>
            📝 ממוצעי משוב ({withFeedback.length} פרויקטים)
          </div>
          {[["חוויה כללית","overall"],["קלות שימוש","ease"],["בהירות חישובים","clarity"],["ימליץ לאחרים","recommend"]]
            .map(([l,k])=>{
              const v=fbAvg(k);
              return(
                <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <span style={{fontSize:12,color:"#666"}}>{l}</span>
                  <div style={{display:"flex",alignItems:"center",gap:4}}>
                    <span style={{fontSize:12,fontWeight:700,color:"#c8853a"}}>{v}</span>
                    <span style={{fontSize:11,color:"#aaa"}}>/5</span>
                  </div>
                </div>
              );
            })}
          <div style={{fontSize:12,fontWeight:700,color:"#555",marginBottom:7,marginTop:8}}>תגובות פתוחות — חסר:</div>
          {withFeedback.filter(p=>p.feedback?.missing).map(p=>(
            <div key={p.id} style={{background:"#f8f8f8",borderRadius:8,padding:"7px 10px",marginBottom:5,fontSize:11,color:"#555",fontStyle:"italic"}}>
              "{p.feedback.missing}"
            </div>
          ))}
        </>}

        <button onClick={onClose} style={{...S.gho,marginTop:10}}>סגור</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
