<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🏡 קופה משותפת</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f5f0e8; font-family: 'Segoe UI', 'Arial Hebrew', Arial, sans-serif; direction: rtl; }
@keyframes spin { to { transform: rotate(360deg); } }
.spin { animation: spin .8s linear infinite; }
.lift:active { transform: scale(.98); }
input:focus, select:focus { border-color: #c8853a !important; outline: none; }
button:disabled { opacity: .6; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ── Firebase ─────────────────────────────────────────────────
const FB   = "https://villa-budget-8fa87-default-rtdb.firebaseio.com";
const furl = p => `${FB}/${p}.json`;
const fbGet  = async p => { const r=await fetch(furl(p)); if(!r.ok) throw new Error(); return r.json(); };
const fbSet  = async (p,d) => { const r=await fetch(furl(p),{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)}); if(!r.ok) throw new Error(); return r.json(); };
const fbPush = async (p,d) => { const r=await fetch(furl(p),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)}); if(!r.ok) throw new Error(); return r.json(); };
const fbDel  = async p => fetch(furl(p),{method:"DELETE"});

const CATS  = ["🛒 קניות","🍽️ מסעדה","🎢 פעילות","⛽ דלק","🏠 וילה","🧴 צרכים","🎉 אחר"];
const TOTAL_DAYS = 3;

// ── Styles ───────────────────────────────────────────────────
const S = {
  app:    {minHeight:"100vh",background:"#f5f0e8"},
  center: {display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",height:"100vh",background:"#f5f0e8"},
  spin:   {width:36,height:36,border:"3px solid #d4a96a",borderTopColor:"transparent",borderRadius:"50%"},
  hdr:    {background:"linear-gradient(135deg,#c8853a,#a0662a)",padding:"18px 16px 14px",color:"white"},
  hTop:   {display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10},
  logo:   {fontSize:19,fontWeight:700},
  aBtn:   {background:"rgba(255,255,255,.2)",border:"none",color:"white",padding:"6px 14px",borderRadius:20,fontSize:13,cursor:"pointer",fontWeight:600},
  pills:  {display:"flex",gap:8,flexWrap:"wrap"},
  pill:   {background:"rgba(0,0,0,.18)",padding:"4px 10px",borderRadius:20,fontSize:12},
  nav:    {display:"flex",background:"white",borderBottom:"2px solid #ede0cc",overflowX:"auto"},
  nBtn:   {flex:1,padding:"11px 4px",border:"none",background:"transparent",fontSize:12,fontWeight:600,cursor:"pointer",color:"#aaa",whiteSpace:"nowrap",minWidth:60},
  nOn:    {color:"#c8853a",borderBottom:"2px solid #c8853a",marginBottom:-2},
  body:   {padding:14,maxWidth:520,margin:"0 auto"},
  card:   {background:"white",borderRadius:16,padding:16,marginBottom:14,boxShadow:"0 2px 12px rgba(0,0,0,.06)"},
  ttl:    {fontSize:15,fontWeight:700,color:"#2c1810",marginBottom:4},
  sub:    {fontSize:12,color:"#aaa",marginBottom:12},
  row:    {display:"flex",gap:8,marginBottom:8,alignItems:"center"},
  inp:    {border:"2px solid #ede0cc",borderRadius:10,padding:"10px 12px",fontSize:14,background:"#fafafa",flex:1,minWidth:0},
  sel:    {border:"2px solid #ede0cc",borderRadius:10,padding:"10px 12px",fontSize:14,background:"#fafafa",flex:1,minWidth:0},
  chk:    {display:"flex",alignItems:"center",fontSize:13,color:"#555",cursor:"pointer",marginBottom:12},
  pri:    {width:"100%",background:"linear-gradient(135deg,#c8853a,#a0662a)",color:"white",border:"none",borderRadius:12,padding:13,fontSize:15,fontWeight:700,cursor:"pointer",marginTop:4},
  gho:    {width:"100%",background:"transparent",border:"2px dashed #d4a96a",color:"#c8853a",borderRadius:10,padding:10,fontSize:14,fontWeight:600,cursor:"pointer",marginTop:4},
  err:    {color:"#e74c3c",fontSize:13,textAlign:"center",marginBottom:8,marginTop:4},
  eRow:   {background:"white",borderRadius:14,padding:"12px 14px",display:"flex",alignItems:"center",gap:10,boxShadow:"0 1px 6px rgba(0,0,0,.05)",marginBottom:8},
  del:    {background:"none",border:"none",color:"#ccc",fontSize:13,cursor:"pointer",padding:"4px 6px",flexShrink:0},
  empty:  {textAlign:"center",color:"#aaa",padding:40,fontSize:15},
  ov:     {position:"fixed",inset:0,background:"rgba(0,0,0,.55)",display:"flex",justifyContent:"center",alignItems:"center",zIndex:100},
  mod:    {background:"white",borderRadius:20,padding:24,width:"88%",maxWidth:340},
};

// ── Main ─────────────────────────────────────────────────────
function App() {
  const [config,   setConfig]   = useState(null);   // null=loading, false=not set
  const [expenses, setExpenses] = useState({});
  const [deposits, setDeposits] = useState({});
  const [loading,  setLoading]  = useState(true);
  const [saving,   setSaving]   = useState(false);
  const [connErr,  setConnErr]  = useState("");
  const [isAdmin,  setIsAdmin]  = useState(false);
  const [view,     setView]     = useState("expenses");

  // Setup
  const [setupRows, setSetupRows] = useState(Array.from({length:6},()=>({name:"",members:"2",days:TOTAL_DAYS})));
  const [newPin,    setNewPin]    = useState("");
  const [setupErr,  setSetupErr]  = useState("");

  // Edit families modal
  const [editModal, setEditModal] = useState(false);
  const [editRows,  setEditRows]  = useState([]);

  // Expense / deposit forms
  const [exp, setExp] = useState({paidBy:"",amount:"",cat:CATS[0],note:"",shared:true});
  const [dep, setDep] = useState({family:"",amount:""});

  // Auth modal
  const [pinModal, setPinModal] = useState(false);
  const [pinInput, setPinInput] = useState("");
  const [pinErr,   setPinErr]   = useState("");
  const [copied,   setCopied]   = useState(false);

  // ── Load ──────────────────────────────────────────────────
  const loadAll = useCallback(async (quiet=false) => {
    if (!quiet) setLoading(true);
    setConnErr("");
    try {
      const [cfg,exps,deps] = await Promise.all([fbGet("config"),fbGet("expenses"),fbGet("deposits")]);
      setConfig(cfg || false);
      setExpenses(exps || {});
      setDeposits(deps || {});
    } catch { setConnErr("שגיאת חיבור"); }
    finally { if (!quiet) setLoading(false); }
  }, []);

  useEffect(() => { loadAll(); const id=setInterval(()=>loadAll(true),5000); return ()=>clearInterval(id); }, [loadAll]);

  // ── Setup ─────────────────────────────────────────────────
  const finishSetup = async () => {
    const families = setupRows.filter(r=>r.name.trim())
      .map(r=>({name:r.name.trim(), members:Math.max(1,parseInt(r.members)||1), days:parseInt(r.days)||TOTAL_DAYS}));
    if (families.length < 2) { setSetupErr("יש להזין לפחות 2 משפחות"); return; }
    if (newPin.length < 4)   { setSetupErr("קוד PIN — לפחות 4 תווים"); return; }
    setSaving(true);
    try {
      await fbSet("config",{families, adminPin:newPin});
      setConfig({families, adminPin:newPin});
      setIsAdmin(true); setView("expenses");
    } catch { setSetupErr("שגיאה בשמירה"); }
    finally { setSaving(false); }
  };

  // ── Edit families ─────────────────────────────────────────
  const openEdit = () => {
    setEditRows(config.families.map(f=>({...f, days: f.days||TOTAL_DAYS, active: true})));
    setEditModal(true);
  };
  const saveEdit = async () => {
    const families = editRows
      .filter(r=>r.active && r.name.trim())
      .map(r=>({name:r.name.trim(), members:Math.max(1,parseInt(r.members)||1), days:parseInt(r.days)||TOTAL_DAYS}));
    if (families.length < 1) return;
    setSaving(true);
    try {
      const newCfg = {...config, families};
      await fbSet("config", newCfg);
      setConfig(newCfg);
      setEditModal(false);
    } catch { alert("שגיאה"); }
    finally { setSaving(false); }
  };

  // ── Auth ──────────────────────────────────────────────────
  const tryLogin = () => {
    if (pinInput===config?.adminPin) { setIsAdmin(true); closePM(); }
    else { setPinErr("קוד שגוי"); setPinInput(""); }
  };
  const closePM = () => { setPinModal(false); setPinInput(""); setPinErr(""); };

  // ── Expense ───────────────────────────────────────────────
  const addExpense = async () => {
    if (!exp.paidBy||!exp.amount||isNaN(+exp.amount)) return;
    const item = {paidBy:exp.paidBy,amount:+exp.amount,cat:exp.cat,note:exp.note,shared:exp.shared,
      ts:Date.now(),time:new Date().toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"})};
    setSaving(true);
    try {
      const {name} = await fbPush("expenses",item);
      setExpenses(p=>({...p,[name]:item}));
      setExp({paidBy:"",amount:"",cat:CATS[0],note:"",shared:true});
    } catch { setConnErr("שגיאה"); }
    finally { setSaving(false); }
  };
  const delExp = async k => {
    await fbDel(`expenses/${k}`);
    setExpenses(p=>{const n={...p};delete n[k];return n;});
  };

  // ── Deposit ───────────────────────────────────────────────
  const addDeposit = async () => {
    if (!dep.family||!dep.amount) return;
    const item = {family:dep.family,amount:+dep.amount,ts:Date.now()};
    setSaving(true);
    try {
      const {name} = await fbPush("deposits",item);
      setDeposits(p=>({...p,[name]:item}));
      setDep({family:"",amount:""});
    } catch { setConnErr("שגיאה"); }
    finally { setSaving(false); }
  };

  // ── Calculations ──────────────────────────────────────────
  // Each family's "weight" = members × (days / TOTAL_DAYS)
  // totalWeight = sum of all weights
  // cost per "unit" = totalShared / totalWeight
  // family share = costPerUnit × family.weight
  const fams    = config?.families || [];
  const expList = Object.entries(expenses).sort((a,b)=>(b[1].ts||0)-(a[1].ts||0));
  const depList = Object.entries(deposits);
  const totalSh = expList.filter(([,e])=>e.shared).reduce((s,[,e])=>s+e.amount,0);

  const weight  = f => (f.members||1) * ((f.days||TOTAL_DAYS)/TOTAL_DAYS);
  const totalW  = fams.reduce((s,f)=>s+weight(f),0);
  const cpUnit  = totalW>0 ? totalSh/totalW : 0; // cost per "full-person-full-days unit"

  const famShare   = f => cpUnit * weight(f);
  const famPaid    = (f,eList) => eList.filter(([,e])=>e.paidBy===f.name&&e.shared).reduce((s,[,e])=>s+e.amount,0);
  const famDeposit = (f,dList) => dList.filter(([,d])=>d.family===f.name).reduce((s,[,d])=>s+d.amount,0);
  const balance    = f => famDeposit(f,depList)+famPaid(f,expList)-famShare(f);

  // For display: "per person per full stay" = cpUnit (since weight of 1 person full days = 1)
  const ppFullStay = cpUnit;

  const copyLink = () => {
    navigator.clipboard.writeText(window.location.href).catch(()=>{});
    setCopied(true); setTimeout(()=>setCopied(false),2500);
  };

  // ── Screens ───────────────────────────────────────────────
  if (loading) return (
    <div style={S.center}>
      <div className="spin" style={S.spin}/>
      <div style={{color:"#c8853a",marginTop:14,fontSize:15,fontWeight:600}}>מתחבר...</div>
    </div>
  );

  if (connErr && !config) return (
    <div style={S.center}>
      <div style={{fontSize:36,marginBottom:12}}>⚠️</div>
      <div style={{color:"#e74c3c",fontWeight:700,marginBottom:16}}>{connErr}</div>
      <button onClick={()=>loadAll()} style={{...S.pri,width:"auto",padding:"10px 24px"}}>נסה שוב</button>
    </div>
  );

  // ── Setup screen ──────────────────────────────────────────
  if (config===false) return (
    <div style={S.app}>
      <div style={{...S.hdr,paddingBottom:20}}>
        <div style={S.logo}>🏡 קופה משותפת</div>
        <div style={{fontSize:12,opacity:.75,marginTop:4}}>הגדרה ראשונית — פעם אחת</div>
      </div>
      <div style={S.body}>
        <div style={S.card}>
          <div style={S.ttl}>משפחות משתתפות</div>
          <div style={S.sub}>שם · נפשות · ימי שהייה (מתוך {TOTAL_DAYS})</div>

          {/* Header row */}
          <div style={{display:"flex",gap:8,marginBottom:6,paddingLeft:36}}>
            <div style={{flex:2,fontSize:11,color:"#aaa",fontWeight:600}}>שם משפחה</div>
            <div style={{flex:"0 0 64px",fontSize:11,color:"#aaa",fontWeight:600,textAlign:"center"}}>נפשות</div>
            <div style={{flex:"0 0 80px",fontSize:11,color:"#aaa",fontWeight:600,textAlign:"center"}}>ימים</div>
          </div>

          {setupRows.map((r,i)=>(
            <div key={i} style={S.row}>
              <input placeholder={`משפחה ${i+1}`} value={r.name}
                onChange={e=>{const n=[...setupRows];n[i].name=e.target.value;setSetupRows(n);}}
                style={{...S.inp,flex:2}}/>
              <input type="number" min="1" placeholder="נפשות" value={r.members}
                onChange={e=>{const n=[...setupRows];n[i].members=e.target.value;setSetupRows(n);}}
                style={{...S.inp,flex:"0 0 64px",textAlign:"center"}}/>
              <select value={r.days}
                onChange={e=>{const n=[...setupRows];n[i].days=+e.target.value;setSetupRows(n);}}
                style={{...S.sel,flex:"0 0 80px",textAlign:"center"}}>
                <option value={1}>1 יום</option>
                <option value={2}>2 ימים</option>
                <option value={3}>3 ימים ✓</option>
              </select>
            </div>
          ))}
          <button onClick={()=>setSetupRows([...setupRows,{name:"",members:"2",days:TOTAL_DAYS}])} style={S.gho}>
            + הוסף שורה
          </button>
        </div>

        <div style={S.card}>
          <div style={S.ttl}>קוד אדמין 🔐</div>
          <div style={S.sub}>לפחות 4 תווים — רק אתה תדע</div>
          <input type="password" placeholder="קוד סודי" value={newPin}
            onChange={e=>setNewPin(e.target.value)}
            style={{...S.inp,width:"100%"}}/>
        </div>
        {setupErr && <div style={S.err}>{setupErr}</div>}
        <button onClick={finishSetup} disabled={saving} style={S.pri}>
          {saving?"שומר...":"התחל 🚀"}
        </button>
      </div>
    </div>
  );

  // ── Main app ──────────────────────────────────────────────
  return (
    <div style={S.app}>
      <div style={S.hdr}>
        <div style={S.hTop}>
          <span style={S.logo}>🏡 קופה משותפת</span>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {saving&&<span style={{fontSize:11,opacity:.7}}>שומר...</span>}
            {connErr&&<span style={{fontSize:11,color:"#ffaaaa"}}>⚠</span>}
            <button onClick={()=>{setPinModal(true);setPinErr("");setPinInput("");}} style={S.aBtn}>
              {isAdmin?"👑":"🔐"}
            </button>
          </div>
        </div>
        <div style={S.pills}>
          <span style={S.pill}>₪{totalSh.toFixed(0)} הוצאות</span>
          <span style={S.pill}>{fams.length} משפחות</span>
          <span style={S.pill}>₪{ppFullStay.toFixed(1)} לנפש (3 ימים)</span>
        </div>
      </div>

      <div style={S.nav}>
        {[["expenses","💳 הוצאות"],["balance","⚖️ איזון"],["deposits","💰 הפקדות"],
          ...(isAdmin?[["admin","👑 ניהול"]]:[])]
          .map(([v,l])=>(
            <button key={v} onClick={()=>setView(v)}
              style={{...S.nBtn,...(view===v?S.nOn:{})}}>{l}</button>
          ))}
      </div>

      <div style={S.body}>

        {/* ── Expenses ── */}
        {view==="expenses"&&<>
          <div style={S.card}>
            <div style={S.ttl}>הוסף הוצאה</div>
            <div style={S.row}>
              <select value={exp.paidBy} onChange={e=>setExp({...exp,paidBy:e.target.value})} style={S.sel}>
                <option value="">מי שילם?</option>
                {fams.map(f=><option key={f.name}>{f.name}</option>)}
              </select>
              <input type="number" placeholder="₪" value={exp.amount}
                onChange={e=>setExp({...exp,amount:e.target.value})}
                style={{...S.inp,flex:"0 0 90px"}}/>
            </div>
            <div style={S.row}>
              <select value={exp.cat} onChange={e=>setExp({...exp,cat:e.target.value})} style={S.sel}>
                {CATS.map(c=><option key={c}>{c}</option>)}
              </select>
              <input placeholder="הערה" value={exp.note}
                onChange={e=>setExp({...exp,note:e.target.value})}
                style={S.inp}/>
            </div>
            <label style={S.chk}>
              <input type="checkbox" checked={exp.shared}
                onChange={e=>setExp({...exp,shared:e.target.checked})} style={{marginLeft:8}}/>
              הוצאה משותפת — מחולקת לפי נפשות וימים
            </label>
            <button onClick={addExpense} disabled={saving} style={S.pri}>הוסף הוצאה</button>
          </div>
          {expList.length===0&&<div style={S.empty}>עדיין אין הוצאות 🌴</div>}
          {expList.map(([k,e])=>(
            <div key={k} className="lift" style={S.eRow}>
              <span style={{fontSize:22,flexShrink:0}}>{e.cat?.split(" ")[0]}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:14,color:"#2c1810"}}>{e.paidBy}</div>
                {e.note&&<div style={{fontSize:12,color:"#aaa",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.note}</div>}
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2,flexShrink:0}}>
                <span style={{fontWeight:800,color:"#c8853a",fontSize:16}}>₪{(+e.amount).toFixed(0)}</span>
                <span style={{fontSize:10,background:e.shared?"#fdf3e6":"#f0f0f0",color:e.shared?"#c8853a":"#888",padding:"2px 6px",borderRadius:6}}>
                  {e.shared?"משותף":"פרטי"}
                </span>
                <span style={{fontSize:11,color:"#ccc"}}>{e.time}</span>
              </div>
              {isAdmin&&<button onClick={()=>delExp(k)} style={S.del}>✕</button>}
            </div>
          ))}
        </>}

        {/* ── Balance ── */}
        {view==="balance"&&<>
          <div style={{...S.card,textAlign:"center",marginBottom:12}}>
            <div style={{fontSize:12,color:"#aaa"}}>עלות לנפש לחופשה מלאה (3 ימים)</div>
            <div style={{fontSize:28,fontWeight:800,color:"#c8853a"}}>₪{ppFullStay.toFixed(1)}</div>
          </div>
          {fams.map(f=>{
            const bal=balance(f), pos=bal>=0;
            const daysLabel = (f.days||TOTAL_DAYS)<TOTAL_DAYS ? `⚡ ${f.days||TOTAL_DAYS} ימים` : null;
            return (
              <div key={f.name} style={{...S.card,borderRight:`4px solid ${pos?"#2ecc71":"#e74c3c"}`,padding:"14px 16px",marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:15,fontWeight:700,color:"#2c1810"}}>{f.name}</span>
                      {daysLabel&&<span style={{fontSize:11,background:"#fff3e0",color:"#e67e22",padding:"2px 7px",borderRadius:10,fontWeight:600}}>{daysLabel}</span>}
                    </div>
                    <div style={{fontSize:12,color:"#aaa",marginTop:3}}>
                      {f.members} נפשות · {f.days||TOTAL_DAYS} ימים · חלק ₪{famShare(f).toFixed(0)}
                    </div>
                  </div>
                  <div style={{textAlign:"left"}}>
                    <div style={{fontSize:22,fontWeight:800,color:pos?"#2ecc71":"#e74c3c"}}>{pos?"+":""}₪{Math.abs(bal).toFixed(0)}</div>
                    <div style={{fontSize:11,color:pos?"#27ae60":"#c0392b",fontWeight:600}}>{pos?"מגיע בחזרה ✓":"צריך להשלים →"}</div>
                  </div>
                </div>
              </div>
            );
          })}
          <div style={{...S.card,fontSize:12,color:"#aaa",lineHeight:1.7}}>
            <strong style={{color:"#888"}}>איך מחושב החלק:</strong><br/>
            עלות × (נפשות × ימי שהייה / {TOTAL_DAYS})<br/>
            כך שמשפחה ל-1 יום משלמת שליש ממשפחה מלאה, לפי נפשות.
          </div>
        </>}

        {/* ── Deposits ── */}
        {view==="deposits"&&<>
          <div style={S.card}>
            <div style={S.ttl}>הפקד לקופה</div>
            <div style={S.row}>
              <select value={dep.family} onChange={e=>setDep({...dep,family:e.target.value})} style={S.sel}>
                <option value="">בחר משפחה</option>
                {fams.map(f=><option key={f.name}>{f.name}</option>)}
              </select>
              <input type="number" placeholder="₪" value={dep.amount}
                onChange={e=>setDep({...dep,amount:e.target.value})}
                style={{...S.inp,flex:"0 0 90px"}}/>
            </div>
            <button onClick={addDeposit} disabled={saving} style={S.pri}>הפקד</button>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:12}}>
            {fams.map(f=>{
              const t=depList.filter(([,d])=>d.family===f.name).reduce((s,[,d])=>s+d.amount,0);
              return (
                <div key={f.name} style={{background:"white",borderRadius:12,padding:"10px 14px",textAlign:"center",minWidth:80,boxShadow:"0 1px 6px rgba(0,0,0,.05)"}}>
                  <div style={{fontSize:11,color:"#aaa"}}>{f.name}</div>
                  <div style={{fontSize:17,fontWeight:700,color:"#2c1810"}}>₪{t.toFixed(0)}</div>
                </div>
              );
            })}
          </div>
          <div style={{...S.card,textAlign:"center"}}>
            <div style={{fontSize:12,color:"#aaa"}}>סה״כ בקופה</div>
            <div style={{fontSize:28,fontWeight:800,color:"#c8853a"}}>₪{depList.reduce((s,[,d])=>s+d.amount,0).toFixed(0)}</div>
          </div>
        </>}

        {/* ── Admin ── */}
        {view==="admin"&&isAdmin&&<>
          <div style={S.card}>
            <div style={S.ttl}>שיתוף קישור</div>
            <button onClick={copyLink} style={{...S.pri,background:copied?"#27ae60":"linear-gradient(135deg,#c8853a,#a0662a)"}}>
              {copied?"✓ הועתק!":"📋 העתק קישור לשיתוף"}
            </button>
          </div>
          <div style={S.card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={S.ttl}>משפחות</div>
              <button onClick={openEdit}
                style={{background:"#fdf3e6",border:"none",color:"#c8853a",borderRadius:8,padding:"6px 12px",fontSize:13,fontWeight:600,cursor:"pointer"}}>
                ✏️ עריכה
              </button>
            </div>
            {fams.map(f=>(
              <div key={f.name} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#fdf3e6",borderRadius:8,padding:"8px 12px",marginBottom:6}}>
                <span style={{fontSize:13,fontWeight:600,color:"#a0662a"}}>{f.name}</span>
                <span style={{fontSize:12,color:"#c8853a"}}>
                  {f.members} נפשות
                  {(f.days||TOTAL_DAYS)<TOTAL_DAYS&&<span style={{marginRight:8,background:"#fff3e0",borderRadius:6,padding:"1px 6px"}}>⚡ {f.days} ימים</span>}
                </span>
              </div>
            ))}
          </div>
          <div style={S.card}>
            <div style={S.ttl}>ניהול נתונים</div>
            <button onClick={async()=>{await fbSet("expenses",null);await fbSet("deposits",null);setExpenses({});setDeposits({});}}
              style={{...S.pri,background:"#e67e22"}}>🗑️ מחיקת הוצאות והפקדות</button>
            <button onClick={async()=>{await fbSet("config",null);setConfig(false);setIsAdmin(false);}}
              style={{...S.gho,marginTop:8,borderColor:"#e74c3c",color:"#e74c3c"}}>🔄 איפוס מלא</button>
          </div>
        </>}
      </div>

      {/* ── Edit families modal ── */}
      {editModal&&(
        <div style={S.ov} onClick={e=>e.target===e.currentTarget&&setEditModal(false)}>
          <div style={{...S.mod,maxHeight:"85vh",overflowY:"auto"}}>
            <div style={{fontSize:16,fontWeight:700,color:"#2c1810",marginBottom:4}}>עריכת משפחות</div>
            <div style={{fontSize:12,color:"#aaa",marginBottom:14}}>שנה נפשות / ימים, או בטל השתתפות</div>

            {editRows.map((r,i)=>(
              <div key={i} style={{marginBottom:10,padding:10,background:r.active?"#fafafa":"#f0f0f0",borderRadius:12,border:`1px solid ${r.active?"#ede0cc":"#ddd"}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:r.active?8:0}}>
                  <span style={{fontWeight:700,fontSize:14,color:r.active?"#2c1810":"#aaa"}}>{r.name}</span>
                  <button onClick={()=>{const n=[...editRows];n[i].active=!n[i].active;setEditRows(n);}}
                    style={{border:"none",background:r.active?"#ffe0e0":"#e8f5e9",color:r.active?"#e74c3c":"#27ae60",borderRadius:8,padding:"4px 10px",fontSize:12,cursor:"pointer",fontWeight:600}}>
                    {r.active?"❌ בטל":"✅ הכנס"}
                  </button>
                </div>
                {r.active&&(
                  <div style={{display:"flex",gap:8}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:11,color:"#aaa",marginBottom:4}}>נפשות</div>
                      <input type="number" min="1" value={r.members}
                        onChange={e=>{const n=[...editRows];n[i].members=e.target.value;setEditRows(n);}}
                        style={{...S.inp,textAlign:"center",padding:"8px"}}/>
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:11,color:"#aaa",marginBottom:4}}>ימי שהייה</div>
                      <select value={r.days||TOTAL_DAYS}
                        onChange={e=>{const n=[...editRows];n[i].days=+e.target.value;setEditRows(n);}}
                        style={{...S.sel,padding:"8px"}}>
                        <option value={1}>1 יום</option>
                        <option value={2}>2 ימים</option>
                        <option value={3}>3 ימים</option>
                      </select>
                    </div>
                  </div>
                )}
              </div>
            ))}

            <button onClick={saveEdit} disabled={saving} style={S.pri}>
              {saving?"שומר...":"שמור שינויים ✓"}
            </button>
            <button onClick={()=>setEditModal(false)} style={S.gho}>ביטול</button>
          </div>
        </div>
      )}

      {/* ── PIN modal ── */}
      {pinModal&&(
        <div style={S.ov} onClick={e=>e.target===e.currentTarget&&closePM()}>
          <div style={S.mod}>
            <div style={{fontSize:17,fontWeight:700,color:"#2c1810",textAlign:"center",marginBottom:12}}>
              {isAdmin?"ניהול אדמין":"כניסת אדמין 👑"}
            </div>
            {!isAdmin?<>
              <input type="password" placeholder="קוד PIN" value={pinInput}
                onChange={e=>setPinInput(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&tryLogin()} autoFocus
                style={{...S.inp,width:"100%",textAlign:"center",fontSize:22,letterSpacing:8,marginBottom:8}}/>
              {pinErr&&<div style={S.err}>{pinErr}</div>}
              <button onClick={tryLogin} style={S.pri}>כנס</button>
            </>:(
              <button onClick={()=>{setIsAdmin(false);closePM();setView("expenses");}} style={S.gho}>התנתק</button>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
