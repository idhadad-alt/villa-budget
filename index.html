<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🏡 קופה משותפת</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f5f0e8; font-family: 'Segoe UI', 'Arial Hebrew', Arial, sans-serif; direction: rtl; }
@keyframes spin { to { transform: rotate(360deg); } }
.spin { animation: spin .8s linear infinite; }
.lift:active { transform: scale(.98); }
input:focus, select:focus { border-color: #c8853a !important; outline: none; }
button:disabled { opacity: .6; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const FB   = "https://villa-budget-8fa87-default-rtdb.firebaseio.com";
const furl = p => `${FB}/${p}.json`;
const fbGet  = async p => { const r=await fetch(furl(p)); if(!r.ok) throw new Error(); return r.json(); };
const fbSet  = async (p,d) => { const r=await fetch(furl(p),{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)}); if(!r.ok) throw new Error(); return r.json(); };
const fbPush = async (p,d) => { const r=await fetch(furl(p),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)}); if(!r.ok) throw new Error(); return r.json(); };
const fbDel  = async p => fetch(furl(p),{method:"DELETE"});

const CATS = ["🛒 קניות","🍽️ מסעדה","🎢 פעילות","⛽ דלק","🏠 וילה","🧴 צרכים","🎉 אחר"];
const RENT_TOTAL = 6000;
const FOOD_PER_PERSON = 280;
const TOTAL_DAYS = 3;

const S = {
  app:  {minHeight:"100vh",background:"#f5f0e8"},
  ctr:  {display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",height:"100vh",background:"#f5f0e8"},
  sp:   {width:36,height:36,border:"3px solid #d4a96a",borderTopColor:"transparent",borderRadius:"50%"},
  hdr:  {background:"linear-gradient(135deg,#c8853a,#a0662a)",padding:"16px 14px 12px",color:"white"},
  hTop: {display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8},
  logo: {fontSize:17,fontWeight:700},
  aBtn: {background:"rgba(255,255,255,.2)",border:"none",color:"white",padding:"5px 12px",borderRadius:20,fontSize:12,cursor:"pointer",fontWeight:600},
  pills:{display:"flex",gap:6,flexWrap:"wrap"},
  pill: {background:"rgba(0,0,0,.18)",padding:"3px 9px",borderRadius:20,fontSize:11},
  nav:  {display:"flex",background:"white",borderBottom:"2px solid #ede0cc",overflowX:"auto"},
  nBtn: {flex:1,padding:"10px 3px",border:"none",background:"transparent",fontSize:11,fontWeight:600,cursor:"pointer",color:"#aaa",whiteSpace:"nowrap",minWidth:55},
  nOn:  {color:"#c8853a",borderBottom:"2px solid #c8853a",marginBottom:-2},
  body: {padding:12,maxWidth:520,margin:"0 auto"},
  card: {background:"white",borderRadius:14,padding:14,marginBottom:10,boxShadow:"0 2px 10px rgba(0,0,0,.06)"},
  ttl:  {fontSize:14,fontWeight:700,color:"#2c1810",marginBottom:3},
  sub:  {fontSize:11,color:"#aaa",marginBottom:10},
  row:  {display:"flex",gap:7,marginBottom:7,alignItems:"center"},
  inp:  {border:"2px solid #ede0cc",borderRadius:9,padding:"9px 10px",fontSize:13,background:"#fafafa",flex:1,minWidth:0},
  sel:  {border:"2px solid #ede0cc",borderRadius:9,padding:"9px 10px",fontSize:13,background:"#fafafa",flex:1,minWidth:0},
  chk:  {display:"flex",alignItems:"center",fontSize:12,color:"#555",cursor:"pointer",marginBottom:10},
  pri:  {width:"100%",background:"linear-gradient(135deg,#c8853a,#a0662a)",color:"white",border:"none",borderRadius:11,padding:12,fontSize:14,fontWeight:700,cursor:"pointer",marginTop:4},
  sec:  {width:"100%",background:"#ebf5fb",color:"#2980b9",border:"none",borderRadius:11,padding:10,fontSize:13,fontWeight:600,cursor:"pointer",marginTop:5},
  gho:  {width:"100%",background:"transparent",border:"2px dashed #d4a96a",color:"#c8853a",borderRadius:9,padding:9,fontSize:13,fontWeight:600,cursor:"pointer",marginTop:4},
  err:  {color:"#e74c3c",fontSize:12,textAlign:"center",marginBottom:5,marginTop:3},
  eRow: {background:"white",borderRadius:11,padding:"10px 12px",display:"flex",alignItems:"center",gap:8,boxShadow:"0 1px 5px rgba(0,0,0,.05)",marginBottom:6},
  del:  {background:"none",border:"none",color:"#ddd",fontSize:12,cursor:"pointer",padding:"3px 5px",flexShrink:0},
  empty:{textAlign:"center",color:"#aaa",padding:28,fontSize:13},
  ov:   {position:"fixed",inset:0,background:"rgba(0,0,0,.55)",display:"flex",justifyContent:"center",alignItems:"center",zIndex:100},
  mod:  {background:"white",borderRadius:18,padding:18,width:"91%",maxWidth:360,maxHeight:"88vh",overflowY:"auto"},
};

// ── Core calculation ──────────────────────────────────────────
function calc(config, expenses, deposits) {
  const fams = config?.families || [];
  const expList = Object.entries(expenses||{}).sort((a,b)=>(b[1].ts||0)-(a[1].ts||0));
  const depList = Object.entries(deposits||{});

  const totalNef = fams.reduce((s,f)=>s+f.members,0);

  // Obligation: manual override OR formula
  const famObligation = f => {
    if (f.customObligation != null) return f.customObligation;
    const rent = totalNef>0 ? (RENT_TOTAL/totalNef)*f.members : 0;
    const food = FOOD_PER_PERSON * f.members;
    return rent + food;
  };

  // Shared expense weight
  const weight  = f => f.members * ((f.days||TOTAL_DAYS)/TOTAL_DAYS);
  const totalW  = fams.reduce((s,f)=>s+weight(f),0);
  const sharedExpTotal = expList.filter(([,e])=>e.shared&&e.type!=="refund").reduce((s,[,e])=>s+e.amount,0);
  const cpUnit  = totalW>0 ? sharedExpTotal/totalW : 0;
  const famSharedCost = f => cpUnit * weight(f);

  // Per family
  const famDeposited   = f => depList.filter(([,d])=>d.family===f.name).reduce((s,[,d])=>s+d.amount,0);
  const famPrivatePaid = f => expList.filter(([,e])=>e.paidBy===f.name&&e.source==="private"&&e.shared&&e.type!=="refund").reduce((s,[,e])=>s+e.amount,0);
  const famRefunds     = f => expList.filter(([,e])=>e.type==="refund"&&e.family===f.name).reduce((s,[,e])=>s+e.amount,0);

  // Effective contribution = deposited + paid privately (both are real money given)
  const famContribution = f => famDeposited(f) + famPrivatePaid(f);

  // Balance = contribution - obligation - share of actual spending - refunds received
  // Positive = owed back, Negative = still owes
  const famBalance = f => famContribution(f) - famObligation(f) - famSharedCost(f) - famRefunds(f);

  // Envelope
  const totalDeposited   = depList.reduce((s,[,d])=>s+d.amount,0);
  const envelopeExpenses = expList.filter(([,e])=>e.source==="envelope"&&e.shared&&e.type!=="refund").reduce((s,[,e])=>s+e.amount,0);
  const refundsGiven     = expList.filter(([,e])=>e.type==="refund").reduce((s,[,e])=>s+e.amount,0);
  const envelopeBalance  = totalDeposited - envelopeExpenses - refundsGiven;

  // Projected refunds = sum of positive family balances (money that needs to go back)
  const projectedRefunds = fams.reduce((s,f)=>{ const b=famBalance(f); return s+(b>0?b:0); },0);
  // Net available = envelope balance - what we expect to return
  const netAvailable = envelopeBalance - projectedRefunds;

  // Total obligation
  const totalObligation = fams.reduce((s,f)=>s+famObligation(f),0);
  // Shortfall: how much more needs to be collected
  const shortfall = sharedExpTotal - totalDeposited;

  return {
    fams, expList, depList, totalNef,
    famObligation, famSharedCost, famDeposited, famPrivatePaid,
    famRefunds, famContribution, famBalance,
    envelopeBalance, totalDeposited, envelopeExpenses, refundsGiven,
    projectedRefunds, netAvailable,
    sharedExpTotal, cpUnit, totalObligation, shortfall
  };
}

function App() {
  const [config,   setConfig]   = useState(null);
  const [expenses, setExpenses] = useState({});
  const [deposits, setDeposits] = useState({});
  const [loading,  setLoading]  = useState(true);
  const [saving,   setSaving]   = useState(false);
  const [connErr,  setConnErr]  = useState("");
  const [isAdmin,  setIsAdmin]  = useState(false);
  const [view,     setView]     = useState("expenses");

  const [setupRows, setSetupRows] = useState(Array.from({length:6},()=>({name:"",members:"2",days:3})));
  const [newPin,    setNewPin]    = useState("");
  const [setupErr,  setSetupErr]  = useState("");

  const [exp, setExp] = useState({paidBy:"",amount:"",cat:CATS[0],note:"",shared:true,source:"envelope"});
  const [dep, setDep] = useState({family:"",amount:""});
  const [ref, setRef] = useState({family:"",amount:"",note:""});

  const [pinModal,     setPinModal]     = useState(false);
  const [pinInput,     setPinInput]     = useState("");
  const [pinErr,       setPinErr]       = useState("");
  const [editModal,    setEditModal]    = useState(false);
  const [editRows,     setEditRows]     = useState([]);
  const [refundModal,  setRefundModal]  = useState(false);
  const [obligModal,   setObligModal]   = useState(false); // manual obligation editor
  const [obligRows,    setObligRows]    = useState([]);
  const [copied,       setCopied]       = useState(false);

  const loadAll = useCallback(async (quiet=false) => {
    if (!quiet) setLoading(true);
    setConnErr("");
    try {
      const [cfg,exps,deps] = await Promise.all([fbGet("config"),fbGet("expenses"),fbGet("deposits")]);
      setConfig(cfg||false);
      setExpenses(exps||{});
      setDeposits(deps||{});
    } catch { setConnErr("שגיאת חיבור"); }
    finally { if (!quiet) setLoading(false); }
  }, []);

  useEffect(()=>{loadAll();const id=setInterval(()=>loadAll(true),5000);return()=>clearInterval(id);},[loadAll]);

  const finishSetup = async () => {
    const families = setupRows.filter(r=>r.name.trim())
      .map(r=>({name:r.name.trim(),members:Math.max(1,parseInt(r.members)||1),days:parseInt(r.days)||3}));
    if (families.length<2){setSetupErr("לפחות 2 משפחות");return;}
    if (newPin.length<4){setSetupErr("קוד PIN — לפחות 4 תווים");return;}
    setSaving(true);
    try {
      await fbSet("config",{families,adminPin:newPin});
      setConfig({families,adminPin:newPin});
      setIsAdmin(true); setView("expenses");
    } catch {setSetupErr("שגיאה");}
    finally {setSaving(false);}
  };

  const openEdit = () => {setEditRows(config.families.map(f=>({...f,active:true}))); setEditModal(true);};
  const saveEdit = async () => {
    const families = editRows.filter(r=>r.active&&r.name.trim())
      .map(r=>({...r,name:r.name.trim(),members:Math.max(1,parseInt(r.members)||1),days:parseInt(r.days)||3}));
    if (!families.length) return;
    setSaving(true);
    try { const nc={...config,families}; await fbSet("config",nc); setConfig(nc); setEditModal(false); }
    catch {} finally {setSaving(false);}
  };

  // Manual obligation editor
  const openOblig = () => {
    setObligRows(config.families.map(f=>({name:f.name, custom: f.customObligation!=null ? String(f.customObligation) : ""})));
    setObligModal(true);
  };
  const saveOblig = async () => {
    const families = config.families.map(f=>{
      const row = obligRows.find(r=>r.name===f.name);
      const v = row && row.custom.trim() ? parseFloat(row.custom) : null;
      return {...f, customObligation: v};
    });
    setSaving(true);
    try { const nc={...config,families}; await fbSet("config",nc); setConfig(nc); setObligModal(false); }
    catch {} finally {setSaving(false);}
  };

  const tryLogin = () => {
    if (pinInput===config?.adminPin){setIsAdmin(true);closePM();}
    else {setPinErr("קוד שגוי");setPinInput("");}
  };
  const closePM = () => {setPinModal(false);setPinInput("");setPinErr("");};

  const addExpense = async () => {
    if (!exp.paidBy||!exp.amount||isNaN(+exp.amount)) return;
    const item = {paidBy:exp.paidBy,amount:+exp.amount,cat:exp.cat,note:exp.note,
      shared:exp.shared,source:exp.source,type:"expense",ts:Date.now(),
      time:new Date().toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"})};
    setSaving(true);
    try {
      const {name}=await fbPush("expenses",item);
      setExpenses(p=>({...p,[name]:item}));
      setExp({paidBy:"",amount:"",cat:CATS[0],note:"",shared:true,source:"envelope"});
    } catch {setConnErr("שגיאה");} finally {setSaving(false);}
  };
  const delItem = async k => { await fbDel(`expenses/${k}`); setExpenses(p=>{const n={...p};delete n[k];return n;}); };

  const addDeposit = async () => {
    if (!dep.family||!dep.amount) return;
    const item={family:dep.family,amount:+dep.amount,ts:Date.now()};
    setSaving(true);
    try {
      const {name}=await fbPush("deposits",item);
      setDeposits(p=>({...p,[name]:item}));
      setDep({family:"",amount:""});
    } catch {setConnErr("שגיאה");} finally {setSaving(false);}
  };
  const delDeposit = async k => { await fbDel(`deposits/${k}`); setDeposits(p=>{const n={...p};delete n[k];return n;}); };

  const addRefund = async () => {
    if (!ref.family||!ref.amount) return;
    const item={type:"refund",family:ref.family,amount:+ref.amount,note:ref.note||"החזר מזומן",
      paidBy:"קופה",source:"envelope",shared:false,ts:Date.now(),
      time:new Date().toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"})};
    setSaving(true);
    try {
      const {name}=await fbPush("expenses",item);
      setExpenses(p=>({...p,[name]:item}));
      setRef({family:"",amount:"",note:""}); setRefundModal(false);
    } catch {setConnErr("שגיאה");} finally {setSaving(false);}
  };

  const C = calc(config,expenses,deposits);
  const {fams,expList,depList,envelopeBalance,netAvailable,shortfall,
         famBalance,famObligation,famSharedCost,famContribution,famDeposited,famPrivatePaid,famRefunds,
         projectedRefunds,totalDeposited,envelopeExpenses,refundsGiven,sharedExpTotal} = C;

  const copyLink = () => { navigator.clipboard.writeText(window.location.href).catch(()=>{}); setCopied(true); setTimeout(()=>setCopied(false),2500); };

  if (loading) return <div style={S.ctr}><div className="spin" style={S.sp}/><div style={{color:"#c8853a",marginTop:12,fontSize:14,fontWeight:600}}>מתחבר...</div></div>;
  if (connErr&&!config) return <div style={S.ctr}><div style={{fontSize:30,marginBottom:10}}>⚠️</div><div style={{color:"#e74c3c",fontWeight:700,marginBottom:12}}>{connErr}</div><button onClick={()=>loadAll()} style={{...S.pri,width:"auto",padding:"10px 22px"}}>נסה שוב</button></div>;

  if (config===false) return (
    <div style={S.app}>
      <div style={{...S.hdr,paddingBottom:16}}>
        <div style={S.logo}>🏡 קופה משותפת</div>
        <div style={{fontSize:11,opacity:.75,marginTop:3}}>הגדרה ראשונית</div>
      </div>
      <div style={S.body}>
        <div style={S.card}>
          <div style={S.ttl}>חיוב בסיסי לנפש</div>
          <div style={{display:"flex",gap:7,marginBottom:10}}>
            <div style={{flex:1,background:"#fdf3e6",borderRadius:9,padding:10,textAlign:"center"}}>
              <div style={{fontSize:10,color:"#aaa"}}>לינה (2 לילות)</div>
              <div style={{fontSize:14,fontWeight:700,color:"#c8853a"}}>₪{RENT_TOTAL.toLocaleString()}</div>
              <div style={{fontSize:10,color:"#aaa"}}>מתחלק לפי נפשות</div>
            </div>
            <div style={{flex:1,background:"#fdf3e6",borderRadius:9,padding:10,textAlign:"center"}}>
              <div style={{fontSize:10,color:"#aaa"}}>מזון לנפש</div>
              <div style={{fontSize:14,fontWeight:700,color:"#c8853a"}}>₪{FOOD_PER_PERSON}</div>
              <div style={{fontSize:10,color:"#aaa"}}>לכל התקופה</div>
            </div>
          </div>
          <div style={S.sub}>ניתן לשנות חיוב ידנית לכל משפחה אחרי ההגדרה (כאדמין)</div>
        </div>
        <div style={S.card}>
          <div style={S.ttl}>משפחות משתתפות</div>
          <div style={S.sub}>שם · נפשות · ימי שהייה</div>
          {setupRows.map((r,i)=>(
            <div key={i} style={S.row}>
              <input placeholder={`משפחה ${i+1}`} value={r.name}
                onChange={e=>{const n=[...setupRows];n[i].name=e.target.value;setSetupRows(n);}}
                style={{...S.inp,flex:2}}/>
              <input type="number" min="1" value={r.members}
                onChange={e=>{const n=[...setupRows];n[i].members=e.target.value;setSetupRows(n);}}
                style={{...S.inp,flex:"0 0 56px",textAlign:"center"}}/>
              <select value={r.days} onChange={e=>{const n=[...setupRows];n[i].days=+e.target.value;setSetupRows(n);}}
                style={{...S.sel,flex:"0 0 72px"}}>
                <option value={1}>1 יום</option><option value={2}>2 ימים</option><option value={3}>3 ימים</option>
              </select>
            </div>
          ))}
          <button onClick={()=>setSetupRows([...setupRows,{name:"",members:"2",days:3}])} style={S.gho}>+ הוסף</button>
        </div>
        <div style={S.card}>
          <div style={S.ttl}>קוד אדמין 🔐</div>
          <input type="password" placeholder="לפחות 4 תווים" value={newPin} onChange={e=>setNewPin(e.target.value)} style={{...S.inp,width:"100%"}}/>
        </div>
        {setupErr&&<div style={S.err}>{setupErr}</div>}
        <button onClick={finishSetup} disabled={saving} style={S.pri}>{saving?"שומר...":"התחל 🚀"}</button>
      </div>
    </div>
  );

  const isOverBudget = shortfall > 0;
  const envColor = envelopeBalance>=0?"#27ae60":"#e74c3c";
  const netColor = netAvailable>=0?"#27ae60":"#e74c3c";

  return (
    <div style={S.app}>
      <div style={S.hdr}>
        <div style={S.hTop}>
          <span style={S.logo}>🏡 קופה משותפת</span>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            {saving&&<span style={{fontSize:10,opacity:.7}}>שומר...</span>}
            {connErr&&<span style={{fontSize:10,color:"#ffaaaa"}}>⚠</span>}
            <button onClick={()=>{setPinModal(true);setPinErr("");setPinInput("");}} style={S.aBtn}>
              {isAdmin?"👑":"🔐"}
            </button>
          </div>
        </div>
        <div style={S.pills}>
          <span style={S.pill}>הפקדות: ₪{totalDeposited.toFixed(0)}</span>
          <span style={S.pill}>הוצאות: ₪{sharedExpTotal.toFixed(0)}</span>
          <span style={S.pill}>{fams.length} משפחות · {C.totalNef} נפשות</span>
        </div>
      </div>

      <div style={S.nav}>
        {[["expenses","💳 הוצאות"],["balance","⚖️ מאזן"],["deposits","💰 הפקדות"],
          ...(isAdmin?[["admin","👑 ניהול"]]:[])]
          .map(([v,l])=>(
            <button key={v} onClick={()=>setView(v)} style={{...S.nBtn,...(view===v?S.nOn:{})}}>{l}</button>
          ))}
      </div>

      <div style={S.body}>

        {/* ── Envelope + net summary (always visible) ── */}
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          <div style={{flex:1,background:"white",borderRadius:12,padding:"10px 12px",boxShadow:"0 1px 6px rgba(0,0,0,.06)",borderTop:`3px solid ${envColor}`}}>
            <div style={{fontSize:10,color:"#aaa",marginBottom:3}}>יתרת מעטפה</div>
            <div style={{fontSize:18,fontWeight:800,color:envColor}}>₪{envelopeBalance.toFixed(0)}</div>
            <div style={{fontSize:10,color:"#aaa",marginTop:2}}>לפני החזרים</div>
          </div>
          <div style={{flex:1,background:"white",borderRadius:12,padding:"10px 12px",boxShadow:"0 1px 6px rgba(0,0,0,.06)",borderTop:`3px solid ${netColor}`}}>
            <div style={{fontSize:10,color:"#aaa",marginBottom:3}}>פנוי בפועל</div>
            <div style={{fontSize:18,fontWeight:800,color:netColor}}>₪{netAvailable.toFixed(0)}</div>
            <div style={{fontSize:10,color:"#aaa",marginTop:2}}>אחרי החזרים צפויים</div>
          </div>
        </div>

        {/* Over-budget warning */}
        {isOverBudget&&(
          <div style={{background:"#fff5f5",border:"1px solid #f5c6cb",borderRadius:11,padding:"10px 12px",marginBottom:10}}>
            <div style={{fontSize:13,fontWeight:700,color:"#c0392b",marginBottom:5}}>⚠️ חריגה מהתקציב — ₪{shortfall.toFixed(0)}</div>
            <div style={{fontSize:11,color:"#888",marginBottom:6}}>כל משפחה צריכה להשלים:</div>
            {fams.map(f=>{
              const add = (shortfall/C.totalNef)*f.members;
              return <div key={f.name} style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}>
                <span style={{color:"#555"}}>{f.name}</span>
                <span style={{fontWeight:700,color:"#c0392b"}}>+₪{add.toFixed(0)}</span>
              </div>;
            })}
          </div>
        )}

        {/* ── Expenses Tab ── */}
        {view==="expenses"&&<>
          <div style={S.card}>
            <div style={S.ttl}>רישום הוצאה</div>
            <div style={S.row}>
              <select value={exp.paidBy} onChange={e=>setExp({...exp,paidBy:e.target.value})} style={S.sel}>
                <option value="">מי ביצע?</option>
                {fams.map(f=><option key={f.name}>{f.name}</option>)}
              </select>
              <input type="number" placeholder="₪" value={exp.amount}
                onChange={e=>setExp({...exp,amount:e.target.value})} style={{...S.inp,flex:"0 0 78px"}}/>
            </div>
            <div style={S.row}>
              <select value={exp.cat} onChange={e=>setExp({...exp,cat:e.target.value})} style={S.sel}>
                {CATS.map(c=><option key={c}>{c}</option>)}
              </select>
              <input placeholder="הערה" value={exp.note} onChange={e=>setExp({...exp,note:e.target.value})} style={S.inp}/>
            </div>
            <div style={{background:"#f7f3ee",borderRadius:9,padding:9,marginBottom:9}}>
              <div style={{fontSize:11,color:"#888",marginBottom:5,fontWeight:600}}>מקור תשלום:</div>
              <div style={{display:"flex",gap:6}}>
                {[["envelope","🪙 מהמעטפה"],["private","💵 מכיס פרטי"]].map(([v,l])=>(
                  <button key={v} onClick={()=>setExp({...exp,source:v})}
                    style={{flex:1,padding:"7px 3px",borderRadius:8,border:"none",fontSize:12,fontWeight:600,cursor:"pointer",
                      background:exp.source===v?"#c8853a":"white",color:exp.source===v?"white":"#888",
                      boxShadow:"0 1px 3px rgba(0,0,0,.08)"}}>
                    {l}
                  </button>
                ))}
              </div>
              <div style={{fontSize:11,marginTop:6,padding:"5px 7px",borderRadius:6,
                background:exp.source==="private"?"#fff8f0":"#f0fff4",
                color:exp.source==="private"?"#e67e22":"#27ae60"}}>
                {exp.source==="private"?"⚠️ יוצר זכות למשלם — שאר המשתתפים חייבים לו":"✓ מקוזזת מיתרת המעטפה"}
              </div>
            </div>
            <label style={S.chk}>
              <input type="checkbox" checked={exp.shared} onChange={e=>setExp({...exp,shared:e.target.checked})} style={{marginLeft:7}}/>
              הוצאה משותפת (מתחלקת לפי נפשות)
            </label>
            <button onClick={addExpense} disabled={saving} style={S.pri}>רשום הוצאה</button>
            {isAdmin&&<button onClick={()=>setRefundModal(true)} style={S.sec}>💵 רישום החזר מזומן</button>}
          </div>
          {expList.length===0&&<div style={S.empty}>עדיין אין הוצאות 🌴</div>}
          {expList.map(([k,e])=>{
            const isR=e.type==="refund";
            return (
              <div key={k} className="lift" style={{...S.eRow,borderRight:`3px solid ${isR?"#3498db":e.source==="private"?"#e67e22":"#2ecc71"}`}}>
                <span style={{fontSize:19,flexShrink:0}}>{isR?"💵":e.cat?.split(" ")[0]}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:13,color:"#2c1810"}}>{isR?`החזר → ${e.family}`:e.paidBy}</div>
                  {e.note&&<div style={{fontSize:11,color:"#aaa",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.note}</div>}
                </div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2,flexShrink:0}}>
                  <span style={{fontWeight:800,color:"#c8853a",fontSize:14}}>₪{(+e.amount).toFixed(0)}</span>
                  <span style={{fontSize:9,padding:"2px 5px",borderRadius:5,
                    background:isR?"#ebf5fb":e.source==="private"?"#fef5e7":"#eafaf1",
                    color:isR?"#2980b9":e.source==="private"?"#d35400":"#27ae60"}}>
                    {isR?"החזר":e.source==="private"?"כיס פרטי":"מעטפה"}
                  </span>
                  <span style={{fontSize:10,color:"#ccc"}}>{e.time}</span>
                </div>
                {isAdmin&&<button onClick={()=>delItem(k)} style={S.del}>✕</button>}
              </div>
            );
          })}
        </>}

        {/* ── Balance Tab ── */}
        {view==="balance"&&<>
          <div style={{...S.card,marginBottom:8}}>
            <div style={S.ttl}>מאזן משפחות</div>
            <div style={{display:"flex",gap:8,fontSize:11,color:"#888"}}>
              <span>🟢 מגיע חזרה</span>
              <span>🔴 עדיין חייב</span>
            </div>
          </div>
          {fams.map(f=>{
            const bal=famBalance(f), pos=bal>=0;
            const contrib=famContribution(f);
            const obl=famObligation(f);
            const isCustom=f.customObligation!=null;
            return (
              <div key={f.name} style={{...S.card,borderRight:`4px solid ${pos?"#2ecc71":"#e74c3c"}`,padding:"12px 13px",marginBottom:7}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{fontSize:14,fontWeight:700,color:"#2c1810"}}>{f.name}</span>
                      {isCustom&&<span style={{fontSize:10,background:"#fff3e0",color:"#e67e22",padding:"2px 6px",borderRadius:8}}>חיוב ידני</span>}
                    </div>
                    <div style={{fontSize:11,color:"#aaa",marginTop:2}}>{f.members} נפשות · {f.days||3} ימים</div>
                  </div>
                  <div style={{textAlign:"left"}}>
                    <div style={{fontSize:20,fontWeight:800,color:pos?"#2ecc71":"#e74c3c"}}>
                      {pos?"+":""}₪{Math.abs(bal).toFixed(0)}
                    </div>
                    <div style={{fontSize:10,color:pos?"#27ae60":"#c0392b",fontWeight:600}}>
                      {pos?"מגיע בחזרה ✓":"צריך להשלים →"}
                    </div>
                  </div>
                </div>
                <div style={{background:"#fafafa",borderRadius:8,padding:"8px 10px",fontSize:11}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3,color:"#888"}}>
                    <span>חיוב ({isCustom?"ידני":"לינה+מזון"})</span>
                    <span style={{color:"#e74c3c"}}>−₪{obl.toFixed(0)}</span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3,color:"#888"}}>
                    <span>חלק בהוצאות שוטפות</span>
                    <span style={{color:"#e74c3c"}}>−₪{famSharedCost(f).toFixed(0)}</span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3,color:"#888"}}>
                    <span>הפקיד לקופה</span>
                    <span style={{color:"#27ae60"}}>+₪{famDeposited(f).toFixed(0)}</span>
                  </div>
                  {famPrivatePaid(f)>0&&(
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:3,color:"#888"}}>
                      <span>שילם מכיסו</span>
                      <span style={{color:"#27ae60"}}>+₪{famPrivatePaid(f).toFixed(0)}</span>
                    </div>
                  )}
                  {famRefunds(f)>0&&(
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:3,color:"#888"}}>
                      <span>קיבל החזר</span>
                      <span style={{color:"#e74c3c"}}>−₪{famRefunds(f).toFixed(0)}</span>
                    </div>
                  )}
                  <div style={{borderTop:"1px solid #eee",marginTop:5,paddingTop:5,display:"flex",justifyContent:"space-between",fontWeight:700,color:"#555"}}>
                    <span>תרומה בפועל (הפקדה + כיס פרטי)</span>
                    <span style={{color:"#c8853a"}}>₪{contrib.toFixed(0)}</span>
                  </div>
                </div>
              </div>
            );
          })}
          <div style={{...S.card,background:"#f0fff4",border:"1px solid #c3e6cb",marginTop:4}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#555",marginBottom:4}}>
              <span>יתרת מעטפה</span><span>₪{envelopeBalance.toFixed(0)}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#555",marginBottom:4}}>
              <span>החזרים צפויים</span><span style={{color:"#e74c3c"}}>−₪{projectedRefunds.toFixed(0)}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:14,fontWeight:700,color:netColor,borderTop:"1px solid #b2dfdb",paddingTop:6,marginTop:2}}>
              <span>פנוי בפועל</span><span>₪{netAvailable.toFixed(0)}</span>
            </div>
          </div>
        </>}

        {/* ── Deposits Tab ── */}
        {view==="deposits"&&<>
          <div style={S.card}>
            <div style={S.ttl}>רישום הפקדה</div>
            <div style={S.row}>
              <select value={dep.family} onChange={e=>setDep({...dep,family:e.target.value})} style={S.sel}>
                <option value="">בחר משפחה</option>
                {fams.map(f=><option key={f.name}>{f.name}</option>)}
              </select>
              <input type="number" placeholder="₪" value={dep.amount}
                onChange={e=>setDep({...dep,amount:e.target.value})} style={{...S.inp,flex:"0 0 78px"}}/>
            </div>
            <button onClick={addDeposit} disabled={saving} style={S.pri}>הפקד</button>
          </div>
          {fams.map(f=>{
            const dep_=famDeposited(f), obl=famObligation(f), rem=obl-dep_;
            const pct=Math.min(100,dep_/obl*100), done=rem<=0;
            return (
              <div key={f.name} style={{...S.card,padding:"11px 13px",marginBottom:7}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:700,color:"#2c1810"}}>{f.name}</div>
                    <div style={{fontSize:11,color:"#aaa"}}>{f.members} נפשות · חיוב ₪{obl.toFixed(0)}</div>
                  </div>
                  <div style={{textAlign:"left"}}>
                    <div style={{fontSize:15,fontWeight:800,color:done?"#27ae60":"#e74c3c"}}>
                      {done?"✓ שולם":"₪"+rem.toFixed(0)+" חסר"}
                    </div>
                    <div style={{fontSize:10,color:"#aaa"}}>הפקיד ₪{dep_.toFixed(0)}</div>
                  </div>
                </div>
                <div style={{background:"#f0e8dc",borderRadius:4,height:5,overflow:"hidden"}}>
                  <div style={{width:`${pct}%`,height:"100%",background:done?"#2ecc71":"#c8853a",borderRadius:4,transition:"width .4s"}}/>
                </div>
              </div>
            );
          })}
          {depList.length>0&&<>
            <div style={{fontSize:11,color:"#aaa",marginBottom:5,marginTop:2}}>היסטוריה</div>
            {[...depList].sort((a,b)=>(b[1].ts||0)-(a[1].ts||0)).map(([k,d])=>(
              <div key={k} style={{...S.eRow,marginBottom:5}}>
                <span style={{fontSize:17}}>💰</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:13,color:"#2c1810"}}>{d.family}</div>
                </div>
                <span style={{fontWeight:700,color:"#c8853a",fontSize:13}}>₪{d.amount.toFixed(0)}</span>
                {isAdmin&&<button onClick={()=>delDeposit(k)} style={S.del}>✕</button>}
              </div>
            ))}
          </>}
        </>}

        {/* ── Admin Tab ── */}
        {view==="admin"&&isAdmin&&<>
          <div style={S.card}>
            <div style={S.ttl}>שיתוף קישור</div>
            <button onClick={copyLink} style={{...S.pri,background:copied?"#27ae60":"linear-gradient(135deg,#c8853a,#a0662a)"}}>
              {copied?"✓ הועתק!":"📋 העתק קישור"}
            </button>
          </div>
          <div style={S.card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div style={S.ttl}>משפחות</div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={openOblig}
                  style={{background:"#ebf5fb",border:"none",color:"#2980b9",borderRadius:7,padding:"5px 10px",fontSize:11,fontWeight:600,cursor:"pointer"}}>
                  ✏️ חיוב ידני
                </button>
                <button onClick={openEdit}
                  style={{background:"#fdf3e6",border:"none",color:"#c8853a",borderRadius:7,padding:"5px 10px",fontSize:11,fontWeight:600,cursor:"pointer"}}>
                  ✏️ עריכה
                </button>
              </div>
            </div>
            {fams.map(f=>(
              <div key={f.name} style={{display:"flex",justifyContent:"space-between",background:"#fdf3e6",borderRadius:7,padding:"6px 10px",marginBottom:4}}>
                <span style={{fontSize:12,fontWeight:600,color:"#a0662a"}}>{f.name}</span>
                <span style={{fontSize:11,color:"#c8853a"}}>
                  {f.members} נפש · {f.days||3}י · חיוב ₪{C.famObligation(f).toFixed(0)}
                  {f.customObligation!=null&&" ✏️"}
                </span>
              </div>
            ))}
          </div>
          <div style={S.card}>
            <div style={S.ttl}>פעולות</div>
            <button onClick={()=>setRefundModal(true)} style={{...S.pri,background:"#3498db",marginBottom:6}}>💵 רישום החזר מזומן</button>
            <button onClick={async()=>{await fbSet("expenses",null);await fbSet("deposits",null);setExpenses({});setDeposits({});}}
              style={{...S.pri,background:"#e67e22",marginBottom:6}}>🗑️ מחיקת הוצאות והפקדות</button>
            <button onClick={async()=>{await fbSet("config",null);setConfig(false);setIsAdmin(false);}}
              style={{...S.gho,borderColor:"#e74c3c",color:"#e74c3c"}}>🔄 איפוס מלא</button>
          </div>
        </>}
      </div>

      {/* ── Manual obligation modal ── */}
      {obligModal&&(
        <div style={S.ov} onClick={e=>e.target===e.currentTarget&&setObligModal(false)}>
          <div style={S.mod}>
            <div style={{fontSize:15,fontWeight:700,color:"#2c1810",marginBottom:3}}>✏️ קביעת חיוב ידני</div>
            <div style={{fontSize:11,color:"#aaa",marginBottom:12}}>השאר ריק לחזור לחישוב אוטומטי (לינה + מזון)</div>
            {obligRows.map((r,i)=>(
              <div key={r.name} style={{marginBottom:9}}>
                <div style={{fontSize:12,fontWeight:600,color:"#555",marginBottom:4}}>{r.name}</div>
                <div style={{display:"flex",gap:7,alignItems:"center"}}>
                  <input type="number" placeholder={`אוטומטי: ₪${C.famObligation(fams.find(f=>f.name===r.name)||{members:0}).toFixed(0)}`}
                    value={r.custom}
                    onChange={e=>{const n=[...obligRows];n[i].custom=e.target.value;setObligRows(n);}}
                    style={{...S.inp}}/>
                  {r.custom&&<button onClick={()=>{const n=[...obligRows];n[i].custom="";setObligRows(n);}}
                    style={{background:"none",border:"none",color:"#e74c3c",fontSize:12,cursor:"pointer",flexShrink:0}}>
                    ✕ נקה
                  </button>}
                </div>
              </div>
            ))}
            <button onClick={saveOblig} disabled={saving} style={S.pri}>{saving?"שומר...":"שמור ✓"}</button>
            <button onClick={()=>setObligModal(false)} style={S.gho}>ביטול</button>
          </div>
        </div>
      )}

      {/* ── Edit families modal ── */}
      {editModal&&(
        <div style={S.ov} onClick={e=>e.target===e.currentTarget&&setEditModal(false)}>
          <div style={S.mod}>
            <div style={{fontSize:15,fontWeight:700,color:"#2c1810",marginBottom:3}}>עריכת משפחות</div>
            <div style={{fontSize:11,color:"#aaa",marginBottom:12}}>שנה נפשות / ימים, או בטל השתתפות</div>
            {editRows.map((r,i)=>(
              <div key={i} style={{marginBottom:8,padding:10,background:r.active?"#fafafa":"#f0f0f0",borderRadius:11,border:`1px solid ${r.active?"#ede0cc":"#ddd"}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:r.active?7:0}}>
                  <span style={{fontWeight:700,fontSize:13,color:r.active?"#2c1810":"#bbb"}}>{r.name}</span>
                  <button onClick={()=>{const n=[...editRows];n[i].active=!n[i].active;setEditRows(n);}}
                    style={{border:"none",background:r.active?"#ffe0e0":"#e8f5e9",color:r.active?"#e74c3c":"#27ae60",borderRadius:7,padding:"3px 9px",fontSize:11,cursor:"pointer",fontWeight:600}}>
                    {r.active?"❌ בטל":"✅ הכנס"}
                  </button>
                </div>
                {r.active&&(
                  <div style={{display:"flex",gap:6}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:10,color:"#aaa",marginBottom:3}}>נפשות</div>
                      <input type="number" min="1" value={r.members}
                        onChange={e=>{const n=[...editRows];n[i].members=e.target.value;setEditRows(n);}}
                        style={{...S.inp,textAlign:"center",padding:"7px"}}/>
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:10,color:"#aaa",marginBottom:3}}>ימי שהייה</div>
                      <select value={r.days||3} onChange={e=>{const n=[...editRows];n[i].days=+e.target.value;setEditRows(n);}}
                        style={{...S.sel,padding:"7px"}}>
                        <option value={1}>1 יום</option><option value={2}>2 ימים</option><option value={3}>3 ימים</option>
                      </select>
                    </div>
                  </div>
                )}
              </div>
            ))}
            <button onClick={saveEdit} disabled={saving} style={S.pri}>{saving?"שומר...":"שמור ✓"}</button>
            <button onClick={()=>setEditModal(false)} style={S.gho}>ביטול</button>
          </div>
        </div>
      )}

      {/* ── Refund modal ── */}
      {refundModal&&(
        <div style={S.ov} onClick={e=>e.target===e.currentTarget&&setRefundModal(false)}>
          <div style={S.mod}>
            <div style={{fontSize:15,fontWeight:700,color:"#2c1810",marginBottom:3}}>💵 החזר מזומן</div>
            <div style={{fontSize:11,color:"#aaa",marginBottom:12}}>מקטין יתרת המעטפה ומתעד</div>
            <div style={{marginBottom:8}}>
              <div style={{fontSize:11,color:"#888",marginBottom:4}}>משפחה מקבלת</div>
              <select value={ref.family} onChange={e=>setRef({...ref,family:e.target.value})} style={{...S.sel,width:"100%"}}>
                <option value="">בחר משפחה</option>
                {fams.map(f=><option key={f.name}>{f.name}</option>)}
              </select>
            </div>
            <div style={{marginBottom:8}}>
              <div style={{fontSize:11,color:"#888",marginBottom:4}}>סכום ₪</div>
              <input type="number" value={ref.amount} onChange={e=>setRef({...ref,amount:e.target.value})} style={{...S.inp,width:"100%"}}/>
            </div>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:11,color:"#888",marginBottom:4}}>הערה</div>
              <input placeholder="למה ניתן" value={ref.note} onChange={e=>setRef({...ref,note:e.target.value})} style={{...S.inp,width:"100%"}}/>
            </div>
            <button onClick={addRefund} disabled={saving} style={{...S.pri,background:"#3498db"}}>{saving?"שומר...":"אשר החזר"}</button>
            <button onClick={()=>setRefundModal(false)} style={S.gho}>ביטול</button>
          </div>
        </div>
      )}

      {/* ── PIN modal ── */}
      {pinModal&&(
        <div style={S.ov} onClick={e=>e.target===e.currentTarget&&closePM()}>
          <div style={S.mod}>
            <div style={{fontSize:15,fontWeight:700,color:"#2c1810",textAlign:"center",marginBottom:10}}>
              {isAdmin?"ניהול אדמין":"כניסת אדמין 👑"}
            </div>
            {!isAdmin?<>
              <input type="password" placeholder="קוד PIN" value={pinInput}
                onChange={e=>setPinInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&tryLogin()} autoFocus
                style={{...S.inp,width:"100%",textAlign:"center",fontSize:20,letterSpacing:8,marginBottom:7}}/>
              {pinErr&&<div style={S.err}>{pinErr}</div>}
              <button onClick={tryLogin} style={S.pri}>כנס</button>
            </>:<button onClick={()=>{setIsAdmin(false);closePM();setView("expenses");}} style={S.gho}>התנתק</button>}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
